<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#d9a441" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="전략 바둑" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>전략 바둑 AI</title>

  <style>
    :root {
      --board: #d9a441;
      --line: #3b2410;
      --bg: #111;
      --text: #f5f5f5;
      --muted: #aaa;
      --accent: #c00001;
      --panel: #141414;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: max(14px, env(safe-area-inset-top)) 16px 10px;
      background: var(--panel);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .title { min-width: 0; }

    .title h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .title p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .turn-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: #222;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .mini-stone {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      display: inline-block;
    }

    .mini-stone.black {
      background: #050505;
      border: 1px solid #555;
    }

    .mini-stone.white {
      background: #f3f3f3;
      border: 1px solid #bdbdbd;
    }

    .mode-panel {
      padding: 9px 12px;
      background: #171717;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 8px;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-btn {
      border: 1px solid rgba(255,255,255,.08);
      background: #242424;
      color: #ddd;
      border-radius: 999px;
      padding: 9px 8px;
      font-size: 13px;
      font-weight: 900;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .ai-options {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ai-options.show { display: grid; }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: #242424;
      color: #fff;
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .board-area {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 8px;
      min-height: 0;
    }

    .board {
      position: relative;
      width: min(97vw, 82dvh, 720px);
      aspect-ratio: 1 / 1;
      background: var(--board);
      border-radius: 12px;
      box-shadow:
        inset 0 0 0 4px rgba(85, 45, 11, 0.18),
        inset 0 0 28px rgba(80, 43, 7, 0.26),
        0 10px 30px rgba(0, 0, 0, 0.35);
      touch-action: manipulation;
      user-select: none;
      overflow: hidden;
      cursor: pointer;
    }

    .grid-line {
      position: absolute;
      background: var(--line);
      opacity: 0.88;
      pointer-events: none;
      z-index: 1;
    }

    .grid-line.h {
      height: 1.5px;
      left: 8%;
      right: 8%;
      transform: translateY(-50%);
    }

    .grid-line.v {
      width: 1.5px;
      top: 8%;
      bottom: 8%;
      transform: translateX(-50%);
    }

    .star {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--line);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .touch-preview {
      position: absolute;
      width: 8.2%;
      height: 8.2%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      z-index: 4;
      pointer-events: none;
      background: rgba(192, 0, 1, 0.22);
      border: 2px solid rgba(192, 0, 1, 0.75);
      display: none;
    }

    .touch-preview.show { display: block; }

    .stone {
      position: absolute;
      width: 8.2%;
      height: 8.2%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }

    .stone.black {
      background: radial-gradient(circle at 34% 28%, #666 0%, #222 22%, #000 70%);
      box-shadow: 0 3px 7px rgba(0, 0, 0, 0.45);
    }

    .stone.white {
      background: radial-gradient(circle at 32% 26%, #fff 0%, #f8f8f8 35%, #d1d1d1 100%);
      box-shadow:
        0 3px 7px rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .last-move {
      position: absolute;
      width: 2.3%;
      height: 2.3%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: var(--accent);
      z-index: 6;
      pointer-events: none;
      box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.7);
    }

    .thinking {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .thinking.show { display: flex; }

    .thinking-box {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,.75);
      font-size: 13px;
      font-weight: 900;
    }

    .bottom-panel {
      padding: 10px 12px max(12px, env(safe-area-inset-bottom));
      background: var(--panel);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 9px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .info-row strong {
      color: var(--text);
      font-size: 13px;
    }

    .strategy-log {
      min-height: 20px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 6px;
      background: #2d2d2d;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
      background: #3b3b3b;
    }

    button.primary { background: var(--accent); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(94px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 32px);
      padding: 10px 13px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 30;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show { opacity: 1; }

    @media (min-width: 900px) {
      body {
        max-width: 940px;
        margin: 0 auto;
        border-left: 1px solid rgba(255,255,255,0.08);
        border-right: 1px solid rgba(255,255,255,0.08);
      }

      .board-area { padding: 18px; }

      .topbar,
      .mode-panel,
      .bottom-panel { padding-inline: 22px; }
    }

    @media (max-height: 760px) {
      .title p { display: none; }

      .topbar {
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .mode-panel {
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .bottom-panel { padding-top: 8px; }

      .board { width: min(97vw, 67dvh, 720px); }

      button,
      .mode-btn,
      select {
        padding-top: 8px;
        padding-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">
      <h1>전략 바둑 10×10</h1>
      <p>교차점 터치 · 전략형 AI</p>
    </div>

    <div class="turn-badge">
      <span id="turnStone" class="mini-stone black"></span>
      <span id="turnText">흑 차례</span>
    </div>
  </header>

  <section class="mode-panel">
    <div class="mode-row">
      <button id="modeHumanBtn" class="mode-btn active">사람 vs 사람</button>
      <button id="modeAiBtn" class="mode-btn">사람 vs AI</button>
    </div>

    <div id="aiOptions" class="ai-options">
      <select id="playerColorSelect" aria-label="사용자 돌 색">
        <option value="1">내가 흑</option>
        <option value="2">내가 백</option>
      </select>

      <select id="aiLevelSelect" aria-label="AI 난이도">
        <option value="easy">AI 초급</option>
        <option value="normal" selected>AI 전략형</option>
        <option value="hard">AI 수읽기형</option>
      </select>
    </div>
  </section>

  <main class="board-area">
    <div id="board" class="board" aria-label="10x10 바둑판">
      <div id="touchPreview" class="touch-preview"></div>
    </div>
  </main>

  <section class="bottom-panel">
    <div class="info-row">
      <span>수순 <strong><span id="moveCount">0</span>수</strong></span>
      <span>잡은 돌 <strong>흑 <span id="blackCaptures">0</span> · 백 <span id="whiteCaptures">0</span></strong></span>
    </div>

    <div id="strategyLog" class="strategy-log">AI 전략 로그가 여기에 표시됩니다.</div>

    <div class="buttons">
      <button id="passBtn" class="primary">패스</button>
      <button id="undoBtn">무르기</button>
      <button id="scoreBtn">계가</button>
      <button id="resetBtn">새판</button>
    </div>
  </section>

  <div id="thinking" class="thinking">
    <div class="thinking-box">AI 수읽기 중...</div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SIZE = 10;
    const EMPTY = 0;
    const BLACK = 1;
    const WHITE = 2;
    const HUMAN_MODE = "human";
    const AI_MODE = "ai";

    const BOARD_MARGIN_PERCENT = 8;
    const BOARD_SPAN_PERCENT = 84;
    const KOMI = 6.5;

    const boardEl = document.getElementById("board");
    const touchPreviewEl = document.getElementById("touchPreview");
    const turnStoneEl = document.getElementById("turnStone");
    const turnTextEl = document.getElementById("turnText");
    const blackCapturesEl = document.getElementById("blackCaptures");
    const whiteCapturesEl = document.getElementById("whiteCaptures");
    const moveCountEl = document.getElementById("moveCount");
    const toastEl = document.getElementById("toast");
    const thinkingEl = document.getElementById("thinking");
    const modeHumanBtn = document.getElementById("modeHumanBtn");
    const modeAiBtn = document.getElementById("modeAiBtn");
    const aiOptionsEl = document.getElementById("aiOptions");
    const playerColorSelect = document.getElementById("playerColorSelect");
    const aiLevelSelect = document.getElementById("aiLevelSelect");
    const strategyLogEl = document.getElementById("strategyLog");

    let board = createBoard();
    let turn = BLACK;
    let captures = { [BLACK]: 0, [WHITE]: 0 };
    let moveCount = 0;
    let lastMove = null;
    let previousHash = null;
    let history = [];
    let toastTimer = null;
    let previewTimer = null;
    let mode = HUMAN_MODE;
    let playerColor = BLACK;
    let aiColor = WHITE;
    let aiLevel = "normal";
    let aiBusy = false;
    let lastAiReason = "AI 전략 로그가 여기에 표시됩니다.";

    function createBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
    }

    function opponent(color) {
      return color === BLACK ? WHITE : BLACK;
    }

    function colorName(color) {
      return color === BLACK ? "흑" : "백";
    }

    function posToPercent(i) {
      return BOARD_MARGIN_PERCENT + (i / (SIZE - 1)) * BOARD_SPAN_PERCENT;
    }

    function renderStaticBoard() {
      [...boardEl.querySelectorAll(".grid-line, .star")].forEach(el => el.remove());

      for (let i = 0; i < SIZE; i++) {
        const h = document.createElement("div");
        h.className = "grid-line h";
        h.style.top = `${posToPercent(i)}%`;
        boardEl.appendChild(h);

        const v = document.createElement("div");
        v.className = "grid-line v";
        v.style.left = `${posToPercent(i)}%`;
        boardEl.appendChild(v);
      }

      const stars = [[2,2], [2,7], [7,2], [7,7], [5,5]];
      for (const [r, c] of stars) {
        const s = document.createElement("div");
        s.className = "star";
        s.style.top = `${posToPercent(r)}%`;
        s.style.left = `${posToPercent(c)}%`;
        boardEl.appendChild(s);
      }
    }

    function getNearestIntersectionFromPointer(event) {
      const rect = boardEl.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const margin = rect.width * (BOARD_MARGIN_PERCENT / 100);
      const span = rect.width * (BOARD_SPAN_PERCENT / 100);
      const cell = span / (SIZE - 1);

      const c = Math.round((x - margin) / cell);
      const r = Math.round((y - margin) / cell);

      if (!inBounds(r, c)) return null;

      const ix = margin + c * cell;
      const iy = margin + r * cell;
      const distance = Math.hypot(x - ix, y - iy);

      if (distance > cell * 0.52) return null;

      return { r, c, xPercent: posToPercent(c), yPercent: posToPercent(r) };
    }

    function showTouchPreview(point) {
      clearTimeout(previewTimer);
      touchPreviewEl.style.left = `${point.xPercent}%`;
      touchPreviewEl.style.top = `${point.yPercent}%`;
      touchPreviewEl.classList.add("show");
      previewTimer = setTimeout(() => {
        touchPreviewEl.classList.remove("show");
      }, 180);
    }

    function handleBoardPointer(event) {
      event.preventDefault();

      if (aiBusy) return;

      if (mode === AI_MODE && turn === aiColor) {
        showToast("AI 차례입니다.");
        return;
      }

      const point = getNearestIntersectionFromPointer(event);

      if (!point) {
        showToast("줄 교차점 가까이를 눌러주세요.");
        return;
      }

      showTouchPreview(point);
      playMove(point.r, point.c, { byAI: false });
    }

    function renderStones() {
      document.querySelectorAll(".stone, .last-move").forEach(el => el.remove());

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === EMPTY) continue;

          const stone = document.createElement("div");
          stone.className = `stone ${board[r][c] === BLACK ? "black" : "white"}`;
          stone.style.top = `${posToPercent(r)}%`;
          stone.style.left = `${posToPercent(c)}%`;
          boardEl.appendChild(stone);
        }
      }

      if (lastMove) {
        const mark = document.createElement("div");
        mark.className = "last-move";
        mark.style.top = `${posToPercent(lastMove.r)}%`;
        mark.style.left = `${posToPercent(lastMove.c)}%`;
        boardEl.appendChild(mark);
      }

      turnStoneEl.className = `mini-stone ${turn === BLACK ? "black" : "white"}`;
      const modeText = mode === AI_MODE && turn === aiColor ? "AI" : "";
      turnTextEl.textContent = `${colorName(turn)} 차례${modeText ? " · " + modeText : ""}`;
      blackCapturesEl.textContent = captures[BLACK];
      whiteCapturesEl.textContent = captures[WHITE];
      moveCountEl.textContent = moveCount;

      modeHumanBtn.classList.toggle("active", mode === HUMAN_MODE);
      modeAiBtn.classList.toggle("active", mode === AI_MODE);
      aiOptionsEl.classList.toggle("show", mode === AI_MODE);

      strategyLogEl.textContent = lastAiReason;
      saveState();
    }

    function inBounds(r, c) {
      return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }

    function neighbors(r, c) {
      return [[r-1,c], [r+1,c], [r,c-1], [r,c+1]].filter(([nr, nc]) => inBounds(nr, nc));
    }

    function diagonalNeighbors(r, c) {
      return [[r-1,c-1], [r-1,c+1], [r+1,c-1], [r+1,c+1]].filter(([nr, nc]) => inBounds(nr, nc));
    }

    function cloneBoard(source) {
      return source.map(row => [...row]);
    }

    function boardHash(targetBoard = board) {
      return targetBoard.map(row => row.join("")).join("|");
    }

    function getGroupFromBoard(r, c, targetBoard) {
      const color = targetBoard[r][c];
      const visited = new Set();
      const stones = [];
      const liberties = new Set();
      const stack = [[r, c]];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = `${cr},${cc}`;
        if (visited.has(key)) continue;
        visited.add(key);
        stones.push([cr, cc]);

        for (const [nr, nc] of neighbors(cr, cc)) {
          if (targetBoard[nr][nc] === EMPTY) {
            liberties.add(`${nr},${nc}`);
          } else if (targetBoard[nr][nc] === color) {
            stack.push([nr, nc]);
          }
        }
      }

      return { stones, liberties };
    }

    function getAllGroups(targetBoard, color) {
      const visited = new Set();
      const groups = [];

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (targetBoard[r][c] !== color) continue;
          const key = `${r},${c}`;
          if (visited.has(key)) continue;

          const group = getGroupFromBoard(r, c, targetBoard);
          group.stones.forEach(([gr, gc]) => visited.add(`${gr},${gc}`));
          groups.push(group);
        }
      }

      return groups;
    }

    function saveHistory() {
      history.push({
        board: cloneBoard(board),
        turn,
        captures: { ...captures },
        moveCount,
        lastMove: lastMove ? { ...lastMove } : null,
        previousHash,
        mode,
        playerColor,
        aiColor,
        aiLevel,
        lastAiReason
      });

      if (history.length > 120) history.shift();
    }

    function playMove(r, c, options = {}) {
      const byAI = options.byAI || false;

      if (board[r][c] !== EMPTY) {
        if (!byAI) showToast("이미 돌이 있는 자리입니다.");
        return false;
      }

      saveHistory();

      const beforeHash = boardHash();
      const result = simulateMove(board, turn, r, c, previousHash);

      if (!result.ok) {
        history.pop();
        if (!byAI) showToast(result.reason);
        return false;
      }

      board = result.board;
      captures[turn] += result.captured;
      lastMove = { r, c };
      moveCount++;
      previousHash = beforeHash;
      turn = opponent(turn);

      if (result.captured > 0) {
        showToast(`${byAI ? "AI가 " : ""}${result.captured}점 따냈습니다.`);
      }

      renderStones();

      if (!byAI && mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }

      return true;
    }

    function simulateMove(sourceBoard, color, r, c, koHash) {
      if (!inBounds(r, c)) return { ok: false, reason: "범위를 벗어났습니다." };
      if (sourceBoard[r][c] !== EMPTY) return { ok: false, reason: "이미 돌이 있는 자리입니다." };

      const testBoard = cloneBoard(sourceBoard);
      testBoard[r][c] = color;

      let captured = 0;
      const enemy = opponent(color);
      const checkedEnemy = new Set();

      for (const [nr, nc] of neighbors(r, c)) {
        if (testBoard[nr][nc] !== enemy) continue;
        const key = `${nr},${nc}`;
        if (checkedEnemy.has(key)) continue;

        const group = getGroupFromBoard(nr, nc, testBoard);
        group.stones.forEach(([gr, gc]) => checkedEnemy.add(`${gr},${gc}`));

        if (group.liberties.size === 0) {
          for (const [gr, gc] of group.stones) {
            testBoard[gr][gc] = EMPTY;
            captured++;
          }
        }
      }

      const myGroup = getGroupFromBoard(r, c, testBoard);

      if (myGroup.liberties.size === 0) {
        return { ok: false, reason: "자살수는 둘 수 없습니다." };
      }

      const newHash = boardHash(testBoard);
      if (newHash === koHash) {
        return { ok: false, reason: "패 규칙으로 바로 되따낼 수 없습니다." };
      }

      return {
        ok: true,
        board: testBoard,
        captured,
        liberties: myGroup.liberties.size,
        groupSize: myGroup.stones.length
      };
    }

    function scheduleAIMove() {
      aiBusy = true;
      thinkingEl.classList.add("show");

      setTimeout(() => {
        const move = chooseAIMove();
        thinkingEl.classList.remove("show");

        if (!move) {
          aiBusy = false;
          passTurn({ byAI: true });
          return;
        }

        lastAiReason = `AI: ${move.reason}`;
        playMove(move.r, move.c, { byAI: true });
        aiBusy = false;
      }, aiLevel === "hard" ? 700 : 420);
    }

    function chooseAIMove() {
      const candidates = [];

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] !== EMPTY) continue;

          const result = simulateMove(board, aiColor, r, c, previousHash);
          if (!result.ok) continue;

          const evaluation = evaluateStrategicMove(r, c, result);

          if (aiLevel === "hard") {
            evaluation.score += onePlyLookahead(result.board, opponent(aiColor)) * 0.7;
          }

          candidates.push({
            r,
            c,
            score: evaluation.score,
            reason: evaluation.reason
          });
        }
      }

      if (candidates.length === 0) return null;

      candidates.sort((a, b) => b.score - a.score);

      if (aiLevel === "easy") {
        const topRange = candidates.slice(0, Math.min(candidates.length, 16));
        return topRange[Math.floor(Math.random() * topRange.length)];
      }

      if (aiLevel === "normal") {
        const topRange = candidates.slice(0, Math.min(candidates.length, 4));
        return topRange[Math.floor(Math.random() * topRange.length)];
      }

      return candidates[0];
    }

    function evaluateStrategicMove(r, c, result) {
      const enemy = opponent(aiColor);
      let score = 0;
      const reasons = [];

      const beforeShape = evaluateBoardShape(board, aiColor);
      const afterShape = evaluateBoardShape(result.board, aiColor);
      const beforeEnemyShape = evaluateBoardShape(board, enemy);
      const afterEnemyShape = evaluateBoardShape(result.board, enemy);

      const shapeGain = afterShape.total - beforeShape.total;
      const enemyLoss = beforeEnemyShape.total - afterEnemyShape.total;

      score += shapeGain * 1.2;
      score += enemyLoss * 0.8;

      if (result.captured > 0) {
        const captureScore = result.captured * 1400;
        score += captureScore;
        reasons.push(`${result.captured}점 따냄`);
      }

      if (result.liberties <= 1) {
        score -= 450;
        reasons.push("자충 위험");
      } else if (result.liberties === 2) {
        score -= 70;
      } else {
        score += result.liberties * 60;
      }

      const myAtariBefore = countGroupsByLiberties(board, aiColor, 1);
      const myAtariAfter = countGroupsByLiberties(result.board, aiColor, 1);
      const savedGroups = myAtariBefore - myAtariAfter;
      if (savedGroups > 0) {
        score += savedGroups * 850;
        reasons.push("단수 탈출");
      }

      const enemyAtariBefore = countGroupsByLiberties(board, enemy, 1);
      const enemyAtariAfter = countGroupsByLiberties(result.board, enemy, 1);
      const attackedGroups = enemyAtariAfter - enemyAtariBefore;
      if (attackedGroups > 0) {
        score += attackedGroups * 520;
        reasons.push("상대 단수");
      }

      const connected = countAdjacentStones(r, c, aiColor);
      if (connected > 0) {
        score += connected * 140;
        reasons.push("연결");
      }

      const cutValue = estimateCutValue(r, c, enemy);
      if (cutValue > 0) {
        score += cutValue * 190;
        reasons.push("끊기");
      }

      const influence = influenceValue(r, c, aiColor);
      score += influence;

      const territory = territoryPotential(r, c, aiColor);
      score += territory;

      const invade = invasionValue(r, c, enemy);
      if (invade > 0) {
        score += invade;
        reasons.push("침투");
      }

      const counterCapture = estimateBestCapture(result.board, enemy);
      if (counterCapture > 0) {
        score -= counterCapture * 900;
        reasons.push("반격 위험 회피");
      }

      const weakAttack = attackWeakGroups(r, c, enemy);
      if (weakAttack > 0) {
        score += weakAttack;
        reasons.push("약한 돌 공격");
      }

      const weakDefend = defendWeakGroups(r, c, aiColor);
      if (weakDefend > 0) {
        score += weakDefend;
        reasons.push("약한 돌 보강");
      }

      const endgame = endgameTerritoryGain(result.board, aiColor) - endgameTerritoryGain(board, aiColor);
      if (moveCount > 50 && endgame > 0) {
        score += endgame * 90;
        reasons.push("끝내기");
      }

      score += Math.random() * (aiLevel === "hard" ? 3 : 22);

      const reason = reasons.length ? reasons.slice(0, 3).join(" · ") : "형세/활로 우선";
      return { score, reason };
    }

    function evaluateBoardShape(targetBoard, color) {
      const enemy = opponent(color);
      const groups = getAllGroups(targetBoard, color);
      const enemyGroups = getAllGroups(targetBoard, enemy);

      let stones = 0;
      let liberties = 0;
      let atariPenalty = 0;
      let connection = 0;
      let influence = 0;
      let territory = estimateTerritory(targetBoard, color);
      let weakEnemyBonus = 0;

      for (const group of groups) {
        stones += group.stones.length;
        liberties += Math.min(group.liberties.size, 8) * 16;

        if (group.liberties.size === 1) atariPenalty -= 520;
        if (group.liberties.size === 2) atariPenalty -= 90;

        for (const [r, c] of group.stones) {
          connection += countAdjacentOnBoard(targetBoard, r, c, color) * 10;
          influence += boardInfluencePoint(r, c);
        }
      }

      for (const group of enemyGroups) {
        if (group.liberties.size === 1) weakEnemyBonus += 280;
        if (group.liberties.size === 2) weakEnemyBonus += 80;
      }

      const total =
        stones * 45 +
        liberties +
        atariPenalty +
        connection +
        influence +
        territory * 65 +
        weakEnemyBonus;

      return { total, stones, liberties, territory };
    }

    function onePlyLookahead(afterBoard, enemyColor) {
      let worstForAI = 0;
      let enemyBest = -Infinity;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (afterBoard[r][c] !== EMPTY) continue;
          const reply = simulateMove(afterBoard, enemyColor, r, c, null);
          if (!reply.ok) continue;

          const enemyGain = evaluateBoardShape(reply.board, enemyColor).total - evaluateBoardShape(afterBoard, enemyColor).total;
          const aiLoss = evaluateBoardShape(afterBoard, aiColor).total - evaluateBoardShape(reply.board, aiColor).total;
          const value = enemyGain + aiLoss + reply.captured * 1200;

          if (value > enemyBest) {
            enemyBest = value;
            worstForAI = value;
          }
        }
      }

      if (!Number.isFinite(enemyBest)) return 0;
      return -worstForAI;
    }

    function countGroupsByLiberties(targetBoard, color, libertiesCount) {
      return getAllGroups(targetBoard, color).filter(g => g.liberties.size === libertiesCount).length;
    }

    function countAdjacentStones(r, c, color) {
      return neighbors(r, c).filter(([nr, nc]) => board[nr][nc] === color).length;
    }

    function countAdjacentOnBoard(targetBoard, r, c, color) {
      return neighbors(r, c).filter(([nr, nc]) => targetBoard[nr][nc] === color).length;
    }

    function estimateCutValue(r, c, enemy) {
      const adjacentEnemyGroups = new Set();

      for (const [nr, nc] of neighbors(r, c)) {
        if (board[nr][nc] !== enemy) continue;
        const group = getGroupFromBoard(nr, nc, board);
        const id = group.stones.map(([gr, gc]) => `${gr},${gc}`).sort().join("|");
        adjacentEnemyGroups.add(id);
      }

      return Math.max(0, adjacentEnemyGroups.size - 1);
    }

    function influenceValue(r, c, color) {
      let score = 0;

      const center = (SIZE - 1) / 2;
      const distCenter = Math.abs(r - center) + Math.abs(c - center);
      score += Math.max(0, 40 - distCenter * 6);

      const edgeDistance = Math.min(r, c, SIZE - 1 - r, SIZE - 1 - c);
      if (moveCount < 35) {
        if (edgeDistance === 0) score -= 70;
        if (edgeDistance === 1) score += 25;
        if (edgeDistance === 2) score += 55;
        if (edgeDistance === 3) score += 35;
      } else {
        if (edgeDistance === 0) score += 15;
        if (edgeDistance === 1) score += 10;
      }

      const starPoints = [[2,2], [2,7], [7,2], [7,7], [5,5]];
      let nearestStar = 99;
      for (const [sr, sc] of starPoints) {
        nearestStar = Math.min(nearestStar, Math.abs(r - sr) + Math.abs(c - sc));
      }
      score += Math.max(0, 48 - nearestStar * 12);

      for (const [nr, nc] of diagonalNeighbors(r, c)) {
        if (board[nr][nc] === color) score += 26;
      }

      return score;
    }

    function boardInfluencePoint(r, c) {
      const center = (SIZE - 1) / 2;
      const distCenter = Math.abs(r - center) + Math.abs(c - center);
      const edgeDistance = Math.min(r, c, SIZE - 1 - r, SIZE - 1 - c);
      return Math.max(0, 16 - distCenter * 2) + edgeDistance * 2;
    }

    function territoryPotential(r, c, color) {
      let score = 0;
      const enemy = opponent(color);

      for (let nr = Math.max(0, r - 2); nr <= Math.min(SIZE - 1, r + 2); nr++) {
        for (let nc = Math.max(0, c - 2); nc <= Math.min(SIZE - 1, c + 2); nc++) {
          if (board[nr][nc] === color) score += 18;
          if (board[nr][nc] === enemy) score -= 8;
        }
      }

      return score;
    }

    function invasionValue(r, c, enemy) {
      let enemyNear = 0;
      let emptyNear = 0;

      for (let nr = Math.max(0, r - 2); nr <= Math.min(SIZE - 1, r + 2); nr++) {
        for (let nc = Math.max(0, c - 2); nc <= Math.min(SIZE - 1, c + 2); nc++) {
          if (board[nr][nc] === enemy) enemyNear++;
          if (board[nr][nc] === EMPTY) emptyNear++;
        }
      }

      if (enemyNear >= 4 && emptyNear >= 5) return 130;
      return 0;
    }

    function attackWeakGroups(r, c, enemy) {
      let score = 0;

      for (const group of getAllGroups(board, enemy)) {
        const minDistance = minDistanceToGroup(r, c, group);
        if (minDistance <= 2) {
          if (group.liberties.size === 2) score += 230;
          if (group.liberties.size === 3) score += 90;
        }
      }

      return score;
    }

    function defendWeakGroups(r, c, color) {
      let score = 0;

      for (const group of getAllGroups(board, color)) {
        const minDistance = minDistanceToGroup(r, c, group);
        if (minDistance <= 2) {
          if (group.liberties.size === 1) score += 680;
          if (group.liberties.size === 2) score += 210;
        }
      }

      return score;
    }

    function minDistanceToGroup(r, c, group) {
      let min = 99;
      for (const [gr, gc] of group.stones) {
        min = Math.min(min, Math.abs(r - gr) + Math.abs(c - gc));
      }
      return min;
    }

    function estimateBestCapture(targetBoard, color) {
      let best = 0;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (targetBoard[r][c] !== EMPTY) continue;
          const result = simulateMove(targetBoard, color, r, c, null);
          if (result.ok) best = Math.max(best, result.captured);
        }
      }

      return best;
    }

    function estimateTerritory(targetBoard, color) {
      const enemy = opponent(color);
      let territory = 0;
      const visited = new Set();

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (targetBoard[r][c] !== EMPTY || visited.has(`${r},${c}`)) continue;

          const region = [];
          const borders = new Set();
          const stack = [[r, c]];

          while (stack.length) {
            const [cr, cc] = stack.pop();
            const key = `${cr},${cc}`;
            if (visited.has(key)) continue;
            visited.add(key);
            region.push([cr, cc]);

            for (const [nr, nc] of neighbors(cr, cc)) {
              if (targetBoard[nr][nc] === EMPTY) {
                stack.push([nr, nc]);
              } else {
                borders.add(targetBoard[nr][nc]);
              }
            }
          }

          if (borders.size === 1 && borders.has(color)) {
            territory += region.length;
          }

          if (borders.has(color) && !borders.has(enemy)) {
            territory += region.length * 0.45;
          }
        }
      }

      return territory;
    }

    function endgameTerritoryGain(targetBoard, color) {
      return estimateTerritory(targetBoard, color);
    }

    function passTurn(options = {}) {
      if (aiBusy && !options.byAI) return;

      saveHistory();
      moveCount++;
      previousHash = boardHash();
      lastMove = null;

      const passedColor = turn;
      turn = opponent(turn);

      showToast(`${options.byAI ? "AI " : ""}${colorName(passedColor)} 패스`);
      renderStones();

      if (!options.byAI && mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }
    }

    function undo() {
      if (aiBusy) return;

      const steps = mode === AI_MODE && history.length >= 2 ? 2 : 1;

      for (let i = 0; i < steps; i++) {
        const prev = history.pop();
        if (!prev) {
          showToast("무를 수 있는 수가 없습니다.");
          return;
        }

        board = prev.board;
        turn = prev.turn;
        captures = prev.captures;
        moveCount = prev.moveCount;
        lastMove = prev.lastMove;
        previousHash = prev.previousHash;
        mode = prev.mode || mode;
        playerColor = prev.playerColor || playerColor;
        aiColor = prev.aiColor || aiColor;
        aiLevel = prev.aiLevel || aiLevel;
        lastAiReason = prev.lastAiReason || lastAiReason;
      }

      playerColorSelect.value = String(playerColor);
      aiLevelSelect.value = aiLevel;
      showToast(mode === AI_MODE ? "내 수와 AI 수를 물렀습니다." : "한 수 물렀습니다.");
      renderStones();
    }

    function resetGame(force = false) {
      if (!force && moveCount > 0 && !confirm("현재 대국을 지우고 새 판을 시작할까요?")) return;

      board = createBoard();
      turn = BLACK;
      captures = { [BLACK]: 0, [WHITE]: 0 };
      moveCount = 0;
      lastMove = null;
      previousHash = null;
      history = [];
      aiBusy = false;
      thinkingEl.classList.remove("show");
      lastAiReason = "AI 전략 로그가 여기에 표시됩니다.";
      localStorage.removeItem("mobile-go-strategy-ai-v1");
      showToast("새 판을 시작합니다.");
      renderStones();

      if (mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }
    }

    function simpleScore() {
      const blackTerritory = estimateTerritory(board, BLACK);
      const whiteTerritory = estimateTerritory(board, WHITE);

      let blackStones = 0;
      let whiteStones = 0;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === BLACK) blackStones++;
          if (board[r][c] === WHITE) whiteStones++;
        }
      }

      const blackScore = blackStones + blackTerritory + captures[BLACK];
      const whiteScore = whiteStones + whiteTerritory + captures[WHITE] + KOMI;

      alert(`간이 계가\n\n흑: ${blackScore.toFixed(1)}\n백: ${whiteScore.toFixed(1)}\n\n※ 사석 수동 지정이 없는 간이 계산입니다.`);
    }

    function setMode(nextMode) {
      if (mode === nextMode) return;

      if (moveCount > 0 && !confirm("모드를 바꾸면 현재 대국이 새로 시작됩니다. 바꿀까요?")) {
        return;
      }

      mode = nextMode;
      updateAIColors();
      resetGame(true);
    }

    function updateAIColors() {
      playerColor = Number(playerColorSelect.value);
      aiColor = opponent(playerColor);
      aiLevel = aiLevelSelect.value;
    }

    function changeAIOption() {
      updateAIColors();
      if (mode !== AI_MODE) return;

      if (moveCount > 0 && confirm("AI 설정을 바꾸려면 새 판을 시작하는 게 좋습니다. 새로 시작할까요?")) {
        resetGame(true);
      } else {
        renderStones();
        if (turn === aiColor) scheduleAIMove();
      }
    }

    function saveState() {
      const state = {
        board,
        turn,
        captures,
        moveCount,
        lastMove,
        previousHash,
        history,
        mode,
        playerColor,
        aiColor,
        aiLevel,
        lastAiReason
      };
      localStorage.setItem("mobile-go-strategy-ai-v1", JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem("mobile-go-strategy-ai-v1");
      if (!raw) return false;

      try {
        const state = JSON.parse(raw);
        if (!state.board || state.board.length !== SIZE) return false;

        board = state.board;
        turn = state.turn || BLACK;
        captures = state.captures || { [BLACK]: 0, [WHITE]: 0 };
        moveCount = state.moveCount || 0;
        lastMove = state.lastMove || null;
        previousHash = state.previousHash || null;
        history = state.history || [];
        mode = state.mode || HUMAN_MODE;
        playerColor = state.playerColor || BLACK;
        aiColor = state.aiColor || WHITE;
        aiLevel = state.aiLevel || "normal";
        lastAiReason = state.lastAiReason || lastAiReason;

        playerColorSelect.value = String(playerColor);
        aiLevelSelect.value = aiLevel;
        return true;
      } catch {
        return false;
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1300);
    }

    modeHumanBtn.addEventListener("click", () => setMode(HUMAN_MODE));
    modeAiBtn.addEventListener("click", () => setMode(AI_MODE));
    playerColorSelect.addEventListener("change", changeAIOption);
    aiLevelSelect.addEventListener("change", changeAIOption);
    boardEl.addEventListener("pointerdown", handleBoardPointer);

    document.getElementById("passBtn").addEventListener("click", () => {
      if (mode === AI_MODE && turn === aiColor) {
        showToast("AI 차례입니다.");
        return;
      }
      passTurn();
    });

    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("resetBtn").addEventListener("click", () => resetGame(false));
    document.getElementById("scoreBtn").addEventListener("click", simpleScore);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderStaticBoard();

    if (!loadState()) {
      board = createBoard();
      turn = BLACK;
      captures = { [BLACK]: 0, [WHITE]: 0 };
      moveCount = 0;
      lastMove = null;
      previousHash = null;
      history = [];
      mode = HUMAN_MODE;
      playerColor = BLACK;
      aiColor = WHITE;
      aiLevel = "normal";
      lastAiReason = "AI 전략 로그가 여기에 표시됩니다.";
    }

    renderStones();

    if (mode === AI_MODE && turn === aiColor) {
      scheduleAIMove();
    }
  </script>
</body>
