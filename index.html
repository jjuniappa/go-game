<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#d9a441" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="모바일 바둑" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>모바일 바둑</title>

  <style>
    :root {
      --board: #d9a441;
      --line: #3b2410;
      --bg: #111;
      --text: #f5f5f5;
      --muted: #aaa;
      --accent: #c00001;
      --panel: #141414;
      --soft: #242424;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: max(14px, env(safe-area-inset-top)) 16px 10px;
      background: var(--panel);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .title p {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .turn-badge {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: #222;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .mini-stone {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      display: inline-block;
    }

    .mini-stone.black {
      background: #050505;
      border: 1px solid #555;
    }

    .mini-stone.white {
      background: #f3f3f3;
      border: 1px solid #bdbdbd;
    }

    .mode-panel {
      padding: 9px 12px;
      background: #171717;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 8px;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mode-btn {
      border: 1px solid rgba(255,255,255,.08);
      background: #242424;
      color: #ddd;
      border-radius: 999px;
      padding: 9px 8px;
      font-size: 13px;
      font-weight: 900;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .ai-options {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ai-options.show {
      display: grid;
    }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      background: #242424;
      color: #fff;
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .board-area {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 10px;
      min-height: 0;
    }

    .board {
      position: relative;
      width: min(96vw, 88dvh, 760px);
      aspect-ratio: 1 / 1;
      background: var(--board);
      border-radius: 10px;
      box-shadow:
        inset 0 0 0 4px rgba(85, 45, 11, 0.18),
        inset 0 0 28px rgba(80, 43, 7, 0.26),
        0 10px 30px rgba(0, 0, 0, 0.35);
      touch-action: manipulation;
      user-select: none;
      overflow: hidden;
    }

    .grid-line {
      position: absolute;
      background: var(--line);
      opacity: 0.86;
      pointer-events: none;
      z-index: 1;
    }

    .grid-line.h {
      height: 1.2px;
      left: 5.2631578947%;
      right: 5.2631578947%;
      transform: translateY(-50%);
    }

    .grid-line.v {
      width: 1.2px;
      top: 5.2631578947%;
      bottom: 5.2631578947%;
      transform: translateX(-50%);
    }

    .star {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--line);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .point {
      position: absolute;
      width: 5.3%;
      height: 5.3%;
      border: 0;
      border-radius: 999px;
      background: transparent;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 4;
      padding: 0;
    }

    .point:active::after {
      content: "";
      position: absolute;
      inset: 20%;
      border-radius: 999px;
      background: rgba(192, 0, 1, 0.42);
    }

    .stone {
      position: absolute;
      width: 4.95%;
      height: 4.95%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }

    .stone.black {
      background: radial-gradient(circle at 34% 28%, #666 0%, #222 22%, #000 70%);
      box-shadow: 0 3px 7px rgba(0, 0, 0, 0.45);
    }

    .stone.white {
      background: radial-gradient(circle at 32% 26%, #fff 0%, #f8f8f8 35%, #d1d1d1 100%);
      box-shadow:
        0 3px 7px rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .last-move {
      position: absolute;
      width: 1.45%;
      height: 1.45%;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: var(--accent);
      z-index: 6;
      pointer-events: none;
      box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.7);
    }

    .thinking {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    .thinking.show {
      display: flex;
    }

    .thinking-box {
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0,0,0,.75);
      font-size: 13px;
      font-weight: 900;
    }

    .bottom-panel {
      padding: 10px 12px max(12px, env(safe-area-inset-bottom));
      background: var(--panel);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 9px;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .info-row strong {
      color: var(--text);
      font-size: 13px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 11px 6px;
      background: #2d2d2d;
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
      background: #3b3b3b;
    }

    button.primary {
      background: var(--accent);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(82px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: calc(100vw - 32px);
      padding: 10px 13px;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 30;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
    }

    .install-hint {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(76px + env(safe-area-inset-bottom));
      background: rgba(20, 20, 20, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 12px 13px;
      z-index: 25;
      font-size: 13px;
      line-height: 1.45;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .install-hint button {
      margin-top: 8px;
      width: 100%;
      background: var(--accent);
    }

    @media (display-mode: standalone) {
      .title p::after {
        content: " · 앱 실행 중";
      }
    }

    @media (min-width: 900px) {
      body {
        max-width: 940px;
        margin: 0 auto;
        border-left: 1px solid rgba(255,255,255,0.08);
        border-right: 1px solid rgba(255,255,255,0.08);
      }

      .board-area {
        padding: 18px;
      }

      .topbar,
      .mode-panel,
      .bottom-panel {
        padding-inline: 22px;
      }
    }

    @media (max-height: 740px) {
      .title p {
        display: none;
      }

      .topbar {
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .mode-panel {
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .bottom-panel {
        padding-top: 8px;
      }

      .board {
        width: min(96vw, 72dvh, 760px);
      }

      button,
      .mode-btn,
      select {
        padding-top: 8px;
        padding-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">
      <h1>모바일 바둑</h1>
      <p>사람 대국 / AI 대국 지원</p>
    </div>

    <div class="turn-badge">
      <span id="turnStone" class="mini-stone black"></span>
      <span id="turnText">흑 차례</span>
    </div>
  </header>

  <section class="mode-panel">
    <div class="mode-row">
      <button id="modeHumanBtn" class="mode-btn active">사람 vs 사람</button>
      <button id="modeAiBtn" class="mode-btn">사람 vs AI</button>
    </div>

    <div id="aiOptions" class="ai-options">
      <select id="playerColorSelect" aria-label="사용자 돌 색">
        <option value="1">내가 흑</option>
        <option value="2">내가 백</option>
      </select>

      <select id="aiLevelSelect" aria-label="AI 난이도">
        <option value="easy">AI 초급</option>
        <option value="normal" selected>AI 보통</option>
      </select>
    </div>
  </section>

  <main class="board-area">
    <div id="board" class="board" aria-label="바둑판"></div>
  </main>

  <section class="bottom-panel">
    <div class="info-row">
      <span>수순 <strong><span id="moveCount">0</span>수</strong></span>
      <span>잡은 돌 <strong>흑 <span id="blackCaptures">0</span> · 백 <span id="whiteCaptures">0</span></strong></span>
    </div>

    <div class="buttons">
      <button id="passBtn" class="primary">패스</button>
      <button id="undoBtn">무르기</button>
      <button id="scoreBtn">계가</button>
      <button id="resetBtn">새판</button>
    </div>
  </section>

  <div id="installHint" class="install-hint">
    안드로이드는 Chrome 메뉴에서 <b>홈 화면에 추가</b>를 누르면 앱처럼 설치됩니다.<br>
    아이폰은 Safari 공유 버튼 → <b>홈 화면에 추가</b>를 누르세요.
    <button id="closeHintBtn">확인</button>
  </div>

  <div id="thinking" class="thinking">
    <div class="thinking-box">AI 생각 중...</div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SIZE = 19;
    const EMPTY = 0;
    const BLACK = 1;
    const WHITE = 2;
    const HUMAN_MODE = "human";
    const AI_MODE = "ai";

    const boardEl = document.getElementById("board");
    const turnStoneEl = document.getElementById("turnStone");
    const turnTextEl = document.getElementById("turnText");
    const blackCapturesEl = document.getElementById("blackCaptures");
    const whiteCapturesEl = document.getElementById("whiteCaptures");
    const moveCountEl = document.getElementById("moveCount");
    const toastEl = document.getElementById("toast");
    const installHintEl = document.getElementById("installHint");
    const thinkingEl = document.getElementById("thinking");
    const modeHumanBtn = document.getElementById("modeHumanBtn");
    const modeAiBtn = document.getElementById("modeAiBtn");
    const aiOptionsEl = document.getElementById("aiOptions");
    const playerColorSelect = document.getElementById("playerColorSelect");
    const aiLevelSelect = document.getElementById("aiLevelSelect");

    let board = createBoard();
    let turn = BLACK;
    let captures = { [BLACK]: 0, [WHITE]: 0 };
    let moveCount = 0;
    let lastMove = null;
    let previousHash = null;
    let history = [];
    let toastTimer = null;
    let mode = HUMAN_MODE;
    let playerColor = BLACK;
    let aiColor = WHITE;
    let aiLevel = "normal";
    let aiBusy = false;

    function createBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
    }

    function opponent(color) {
      return color === BLACK ? WHITE : BLACK;
    }

    function colorName(color) {
      return color === BLACK ? "흑" : "백";
    }

    function posToPercent(i) {
      return (i / (SIZE - 1)) * 89.4736842106 + 5.2631578947;
    }

    function renderStaticBoard() {
      boardEl.innerHTML = "";

      for (let i = 0; i < SIZE; i++) {
        const h = document.createElement("div");
        h.className = "grid-line h";
        h.style.top = `${posToPercent(i)}%`;
        boardEl.appendChild(h);

        const v = document.createElement("div");
        v.className = "grid-line v";
        v.style.left = `${posToPercent(i)}%`;
        boardEl.appendChild(v);
      }

      const stars = [3, 9, 15];
      for (const r of stars) {
        for (const c of stars) {
          const s = document.createElement("div");
          s.className = "star";
          s.style.top = `${posToPercent(r)}%`;
          s.style.left = `${posToPercent(c)}%`;
          boardEl.appendChild(s);
        }
      }

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const p = document.createElement("button");
          p.className = "point";
          p.style.top = `${posToPercent(r)}%`;
          p.style.left = `${posToPercent(c)}%`;
          p.setAttribute("aria-label", `${r + 1}행 ${c + 1}열`);
          p.addEventListener("click", () => handlePointClick(r, c));
          boardEl.appendChild(p);
        }
      }
    }

    function renderStones() {
      document.querySelectorAll(".stone, .last-move").forEach(el => el.remove());

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === EMPTY) continue;

          const stone = document.createElement("div");
          stone.className = `stone ${board[r][c] === BLACK ? "black" : "white"}`;
          stone.style.top = `${posToPercent(r)}%`;
          stone.style.left = `${posToPercent(c)}%`;
          boardEl.appendChild(stone);
        }
      }

      if (lastMove) {
        const mark = document.createElement("div");
        mark.className = "last-move";
        mark.style.top = `${posToPercent(lastMove.r)}%`;
        mark.style.left = `${posToPercent(lastMove.c)}%`;
        boardEl.appendChild(mark);
      }

      turnStoneEl.className = `mini-stone ${turn === BLACK ? "black" : "white"}`;
      const modeText = mode === AI_MODE && turn === aiColor ? "AI" : "";
      turnTextEl.textContent = `${colorName(turn)} 차례${modeText ? " · " + modeText : ""}`;
      blackCapturesEl.textContent = captures[BLACK];
      whiteCapturesEl.textContent = captures[WHITE];
      moveCountEl.textContent = moveCount;

      modeHumanBtn.classList.toggle("active", mode === HUMAN_MODE);
      modeAiBtn.classList.toggle("active", mode === AI_MODE);
      aiOptionsEl.classList.toggle("show", mode === AI_MODE);

      saveState();
    }

    function inBounds(r, c) {
      return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }

    function neighbors(r, c) {
      return [[r-1,c], [r+1,c], [r,c-1], [r,c+1]].filter(([nr, nc]) => inBounds(nr, nc));
    }

    function getGroup(r, c, targetBoard = board) {
      const color = targetBoard[r][c];
      const visited = new Set();
      const stones = [];
      const liberties = new Set();
      const stack = [[r, c]];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = `${cr},${cc}`;
        if (visited.has(key)) continue;
        visited.add(key);
        stones.push([cr, cc]);

        for (const [nr, nc] of neighbors(cr, cc)) {
          if (targetBoard[nr][nc] === EMPTY) {
            liberties.add(`${nr},${nc}`);
          } else if (targetBoard[nr][nc] === color) {
            stack.push([nr, nc]);
          }
        }
      }

      return { stones, liberties };
    }

    function cloneBoard(source) {
      return source.map(row => [...row]);
    }

    function boardHash(targetBoard = board) {
      return targetBoard.map(row => row.join("")).join("|");
    }

    function saveHistory() {
      history.push({
        board: cloneBoard(board),
        turn,
        captures: { ...captures },
        moveCount,
        lastMove: lastMove ? { ...lastMove } : null,
        previousHash,
        mode,
        playerColor,
        aiColor,
        aiLevel
      });

      if (history.length > 120) history.shift();
    }

    function handlePointClick(r, c) {
      if (aiBusy) return;

      if (mode === AI_MODE && turn === aiColor) {
        showToast("AI 차례입니다.");
        return;
      }

      playMove(r, c, { byAI: false });
    }

    function playMove(r, c, options = {}) {
      const byAI = options.byAI || false;

      if (board[r][c] !== EMPTY) {
        if (!byAI) showToast("이미 돌이 있는 자리입니다.");
        return false;
      }

      saveHistory();

      const result = simulateMove(board, turn, r, c, previousHash);
      if (!result.ok) {
        history.pop();
        if (!byAI) showToast(result.reason);
        return false;
      }

      board = result.board;
      captures[turn] += result.captured;
      lastMove = { r, c };
      moveCount++;
      previousHash = boardHash(history[history.length - 1].board);

      const movedColor = turn;
      turn = opponent(turn);

      if (result.captured > 0) {
        showToast(`${byAI ? "AI가 " : ""}${result.captured}점 따냈습니다.`);
      }

      renderStones();

      if (!byAI && mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }

      return true;
    }

    function simulateMove(sourceBoard, color, r, c, koHash) {
      if (!inBounds(r, c)) return { ok: false, reason: "범위를 벗어났습니다." };
      if (sourceBoard[r][c] !== EMPTY) return { ok: false, reason: "이미 돌이 있는 자리입니다." };

      const testBoard = cloneBoard(sourceBoard);
      testBoard[r][c] = color;

      let captured = 0;
      const enemy = opponent(color);
      const checkedEnemy = new Set();

      for (const [nr, nc] of neighbors(r, c)) {
        if (testBoard[nr][nc] !== enemy) continue;
        const key = `${nr},${nc}`;
        if (checkedEnemy.has(key)) continue;

        const group = getGroupFromBoard(nr, nc, testBoard);
        group.stones.forEach(([gr, gc]) => checkedEnemy.add(`${gr},${gc}`));

        if (group.liberties.size === 0) {
          for (const [gr, gc] of group.stones) {
            testBoard[gr][gc] = EMPTY;
            captured++;
          }
        }
      }

      const myGroup = getGroupFromBoard(r, c, testBoard);
      if (myGroup.liberties.size === 0) {
        return { ok: false, reason: "자살수는 둘 수 없습니다." };
      }

      const newHash = boardHash(testBoard);
      if (newHash === koHash) {
        return { ok: false, reason: "패 규칙으로 바로 되따낼 수 없습니다." };
      }

      return {
        ok: true,
        board: testBoard,
        captured,
        liberties: myGroup.liberties.size,
        groupSize: myGroup.stones.length
      };
    }

    function getGroupFromBoard(r, c, targetBoard) {
      const color = targetBoard[r][c];
      const visited = new Set();
      const stones = [];
      const liberties = new Set();
      const stack = [[r, c]];

      while (stack.length) {
        const [cr, cc] = stack.pop();
        const key = `${cr},${cc}`;
        if (visited.has(key)) continue;
        visited.add(key);
        stones.push([cr, cc]);

        for (const [nr, nc] of neighbors(cr, cc)) {
          if (targetBoard[nr][nc] === EMPTY) {
            liberties.add(`${nr},${nc}`);
          } else if (targetBoard[nr][nc] === color) {
            stack.push([nr, nc]);
          }
        }
      }

      return { stones, liberties };
    }

    function scheduleAIMove() {
      aiBusy = true;
      thinkingEl.classList.add("show");

      setTimeout(() => {
        const move = chooseAIMove();
        thinkingEl.classList.remove("show");

        if (!move) {
          aiBusy = false;
          passTurn({ byAI: true });
          return;
        }

        playMove(move.r, move.c, { byAI: true });
        aiBusy = false;
      }, 420);
    }

    function chooseAIMove() {
      const candidates = [];

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] !== EMPTY) continue;

          const result = simulateMove(board, aiColor, r, c, previousHash);
          if (!result.ok) continue;

          const score = evaluateAIMove(r, c, result);
          candidates.push({ r, c, score });
        }
      }

      if (candidates.length === 0) return null;

      candidates.sort((a, b) => b.score - a.score);

      if (aiLevel === "easy") {
        const topRange = candidates.slice(0, Math.min(candidates.length, 80));
        return topRange[Math.floor(Math.random() * topRange.length)];
      }

      const topRange = candidates.slice(0, Math.min(candidates.length, 12));
      return topRange[Math.floor(Math.random() * topRange.length)];
    }

    function evaluateAIMove(r, c, result) {
      let score = 0;

      // 상대 돌을 따내는 수를 가장 선호
      score += result.captured * 120;

      // 내 돌의 활로가 너무 적은 곳은 회피
      score += result.liberties * 8;

      // 중앙보다 화점/귀/변 중심으로 초반 착수 유도
      const starPoints = [
        [3,3], [3,9], [3,15],
        [9,3], [9,9], [9,15],
        [15,3], [15,9], [15,15]
      ];

      let nearestStar = 99;
      for (const [sr, sc] of starPoints) {
        nearestStar = Math.min(nearestStar, Math.abs(r - sr) + Math.abs(c - sc));
      }
      score += Math.max(0, 18 - nearestStar * 3);

      // 가장자리 너무 붙는 수는 초반에 약간 감점
      const edgeDistance = Math.min(r, c, SIZE - 1 - r, SIZE - 1 - c);
      if (moveCount < 40 && edgeDistance <= 1) score -= 12;

      // 상대 단수 그룹을 잡는 수, 내 단수 탈출 느낌 가산
      for (const [nr, nc] of neighbors(r, c)) {
        if (board[nr][nc] === opponent(aiColor)) {
          const g = getGroup(nr, nc, board);
          if (g.liberties.size === 1) score += 80;
          if (g.liberties.size === 2) score += 20;
        }

        if (board[nr][nc] === aiColor) {
          const g = getGroup(nr, nc, board);
          if (g.liberties.size === 1) score += 55;
          if (g.liberties.size === 2) score += 15;
        }
      }

      // 주변 아군과 연결 선호
      for (const [nr, nc] of neighbors(r, c)) {
        if (board[nr][nc] === aiColor) score += 12;
        if (board[nr][nc] === opponent(aiColor)) score += 5;
      }

      // 완전 랜덤성
      score += Math.random() * 16;

      return score;
    }

    function passTurn(options = {}) {
      if (aiBusy && !options.byAI) return;

      saveHistory();
      moveCount++;
      previousHash = boardHash();
      lastMove = null;

      const passedColor = turn;
      turn = opponent(turn);

      showToast(`${options.byAI ? "AI " : ""}${colorName(passedColor)} 패스`);
      renderStones();

      if (!options.byAI && mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }
    }

    function undo() {
      if (aiBusy) return;

      const steps = mode === AI_MODE && history.length >= 2 ? 2 : 1;

      for (let i = 0; i < steps; i++) {
        const prev = history.pop();
        if (!prev) {
          showToast("무를 수 있는 수가 없습니다.");
          return;
        }

        board = prev.board;
        turn = prev.turn;
        captures = prev.captures;
        moveCount = prev.moveCount;
        lastMove = prev.lastMove;
        previousHash = prev.previousHash;
        mode = prev.mode || mode;
        playerColor = prev.playerColor || playerColor;
        aiColor = prev.aiColor || aiColor;
        aiLevel = prev.aiLevel || aiLevel;
      }

      playerColorSelect.value = String(playerColor);
      aiLevelSelect.value = aiLevel;
      showToast(mode === AI_MODE ? "내 수와 AI 수를 물렀습니다." : "한 수 물렀습니다.");
      renderStones();
    }

    function resetGame(force = false) {
      if (!force && moveCount > 0 && !confirm("현재 대국을 지우고 새 판을 시작할까요?")) return;

      board = createBoard();
      turn = BLACK;
      captures = { [BLACK]: 0, [WHITE]: 0 };
      moveCount = 0;
      lastMove = null;
      previousHash = null;
      history = [];
      aiBusy = false;
      thinkingEl.classList.remove("show");
      localStorage.removeItem("mobile-go-state-v2");
      showToast("새 판을 시작합니다.");
      renderStones();

      if (mode === AI_MODE && turn === aiColor) {
        scheduleAIMove();
      }
    }

    function simpleScore() {
      const visited = new Set();
      let blackTerritory = 0;
      let whiteTerritory = 0;
      let blackStones = 0;
      let whiteStones = 0;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === BLACK) blackStones++;
          if (board[r][c] === WHITE) whiteStones++;
        }
      }

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] !== EMPTY || visited.has(`${r},${c}`)) continue;

          const region = [];
          const borders = new Set();
          const stack = [[r, c]];

          while (stack.length) {
            const [cr, cc] = stack.pop();
            const key = `${cr},${cc}`;
            if (visited.has(key)) continue;
            visited.add(key);
            region.push([cr, cc]);

            for (const [nr, nc] of neighbors(cr, cc)) {
              if (board[nr][nc] === EMPTY) {
                stack.push([nr, nc]);
              } else {
                borders.add(board[nr][nc]);
              }
            }
          }

          if (borders.size === 1) {
            if (borders.has(BLACK)) blackTerritory += region.length;
            if (borders.has(WHITE)) whiteTerritory += region.length;
          }
        }
      }

      const blackScore = blackStones + blackTerritory + captures[BLACK];
      const whiteScore = whiteStones + whiteTerritory + captures[WHITE] + 6.5;

      alert(`간이 계가\n\n흑: ${blackScore}\n백: ${whiteScore}\n\n※ 정확한 사석 판정 전 단계의 간이 계산입니다.`);
    }

    function setMode(nextMode) {
      if (mode === nextMode) return;

      if (moveCount > 0 && !confirm("모드를 바꾸면 현재 대국이 새로 시작됩니다. 바꿀까요?")) {
        return;
      }

      mode = nextMode;
      updateAIColors();
      resetGame(true);
    }

    function updateAIColors() {
      playerColor = Number(playerColorSelect.value);
      aiColor = opponent(playerColor);
      aiLevel = aiLevelSelect.value;
    }

    function changeAIOption() {
      updateAIColors();
      if (mode !== AI_MODE) return;

      if (moveCount > 0 && confirm("AI 설정을 바꾸려면 새 판을 시작하는 게 좋습니다. 새로 시작할까요?")) {
        resetGame(true);
      } else {
        renderStones();
        if (turn === aiColor) scheduleAIMove();
      }
    }

    function saveState() {
      const state = {
        board,
        turn,
        captures,
        moveCount,
        lastMove,
        previousHash,
        history,
        mode,
        playerColor,
        aiColor,
        aiLevel
      };
      localStorage.setItem("mobile-go-state-v2", JSON.stringify(state));
    }

    function loadState() {
      const raw = localStorage.getItem("mobile-go-state-v2");
      if (!raw) return false;

      try {
        const state = JSON.parse(raw);
        if (!state.board || state.board.length !== SIZE) return false;

        board = state.board;
        turn = state.turn || BLACK;
        captures = state.captures || { [BLACK]: 0, [WHITE]: 0 };
        moveCount = state.moveCount || 0;
        lastMove = state.lastMove || null;
        previousHash = state.previousHash || null;
        history = state.history || [];
        mode = state.mode || HUMAN_MODE;
        playerColor = state.playerColor || BLACK;
        aiColor = state.aiColor || WHITE;
        aiLevel = state.aiLevel || "normal";

        playerColorSelect.value = String(playerColor);
        aiLevelSelect.value = aiLevel;
        return true;
      } catch {
        return false;
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add("show");
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1300);
    }

    function maybeShowInstallHint() {
      const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
      const dismissed = localStorage.getItem("mobile-go-install-hint-dismissed") === "1";

      if (!standalone && !dismissed) {
        setTimeout(() => {
          installHintEl.style.display = "block";
        }, 800);
      }
    }

    modeHumanBtn.addEventListener("click", () => setMode(HUMAN_MODE));
    modeAiBtn.addEventListener("click", () => setMode(AI_MODE));
    playerColorSelect.addEventListener("change", changeAIOption);
    aiLevelSelect.addEventListener("change", changeAIOption);

    document.getElementById("passBtn").addEventListener("click", () => {
      if (mode === AI_MODE && turn === aiColor) {
        showToast("AI 차례입니다.");
        return;
      }
      passTurn();
    });

    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("resetBtn").addEventListener("click", () => resetGame(false));
    document.getElementById("scoreBtn").addEventListener("click", simpleScore);

    document.getElementById("closeHintBtn").addEventListener("click", () => {
      installHintEl.style.display = "none";
      localStorage.setItem("mobile-go-install-hint-dismissed", "1");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    renderStaticBoard();

    if (!loadState()) {
      board = createBoard();
      turn = BLACK;
      captures = { [BLACK]: 0, [WHITE]: 0 };
      moveCount = 0;
      lastMove = null;
      previousHash = null;
      history = [];
      mode = HUMAN_MODE;
      playerColor = BLACK;
      aiColor = WHITE;
      aiLevel = "normal";
    }

    renderStones();
    maybeShowInstallHint();

    if (mode === AI_MODE && turn === aiColor) {
      scheduleAIMove();
    }
  </script>
</body>
</html>
