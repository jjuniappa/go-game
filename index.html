<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#070707" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Tap Drift" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<title>Tap Drift</title>
<style>
:root{
  --bg:#070707;
  --panel:#111;
  --text:#f7f7f7;
  --muted:#aaa;
  --accent:#c00001;
  --road:#262626;
  --road-line:#eeeeee;
  --glow:#c00001;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
body{min-height:100dvh;display:flex;flex-direction:column}
.topbar{
  padding:max(12px,env(safe-area-inset-top)) 14px 10px;
  background:#101010;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
  z-index:10;
}
.title h1{margin:0;font-size:18px;letter-spacing:-.05em}
.title p{margin:2px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw}
.scorebox{text-align:right;font-size:13px;line-height:1.38;font-weight:950}
.scorebox span{color:var(--muted);font-weight:700}
.game{
  position:relative;
  flex:1;
  min-height:0;
  overflow:hidden;
  touch-action:none;
  background:
    radial-gradient(circle at 50% 45%,rgba(192,0,1,.14),transparent 35%),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(0deg,rgba(255,255,255,.025) 1px,transparent 1px),
    #070707;
  background-size:auto,40px 40px,40px 40px;
}
.canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}
.hud{
  position:absolute;
  left:50%;
  top:16px;
  transform:translateX(-50%);
  padding:8px 13px;
  border-radius:999px;
  background:rgba(0,0,0,.46);
  border:1px solid rgba(255,255,255,.1);
  font-size:12px;
  font-weight:900;
  z-index:5;
  pointer-events:none;
}
.tap-zone{
  position:absolute;
  inset:0;
  z-index:4;
}
.judge{
  position:absolute;
  left:50%;
  top:44%;
  transform:translate(-50%,-50%);
  font-size:34px;
  font-weight:1000;
  letter-spacing:-.05em;
  opacity:0;
  pointer-events:none;
  z-index:8;
  text-shadow:0 6px 24px rgba(0,0,0,.85);
}
.judge.show{animation:judge .55s ease}
@keyframes judge{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.75)}
  22%{opacity:1;transform:translate(-50%,-62%) scale(1.08)}
  100%{opacity:0;transform:translate(-50%,-90%) scale(1)}
}
.overlay{
  position:fixed;
  inset:0;
  z-index:30;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:
    radial-gradient(circle at top,rgba(192,0,1,.25),transparent 34%),
    linear-gradient(180deg,#181818,#050505);
}
.overlay.hidden{display:none}
.card{
  width:min(440px,100%);
  background:rgba(18,18,18,.96);
  border:1px solid rgba(255,255,255,.1);
  border-radius:26px;
  padding:22px;
  box-shadow:0 22px 80px rgba(0,0,0,.55);
}
.card h2{margin:0 0 6px;font-size:31px;letter-spacing:-.08em}
.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.btn{
  width:100%;
  border:0;
  border-radius:16px;
  padding:14px 12px;
  background:var(--accent);
  color:#fff;
  font-weight:950;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
.sub-btn{background:#2d2d2d;font-size:14px;padding:12px}
.difficulty{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.diff-btn{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 6px;background:#252525;color:#ddd;font-size:13px;font-weight:900}
.diff-btn.active{background:var(--accent);color:#fff;border-color:transparent}
.howto{margin-top:12px;color:#999;font-size:12px;line-height:1.55}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#222;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px}
.stat small{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
.stat strong{font-size:21px}
.flash{position:absolute;inset:0;background:rgba(192,0,1,.25);opacity:0;pointer-events:none;z-index:9}
.flash.show{animation:damage .32s ease}
@keyframes damage{0%,100%{opacity:0}40%{opacity:1}}
@media (min-width:900px){
  body{max-width:520px;margin:0 auto;border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="title">
    <h1>Tap Drift</h1>
    <p>탑뷰 원터치 드리프트</p>
  </div>
  <div class="scorebox">
    <div><span>SCORE</span> <b id="scoreText">0</b></div>
    <div><span>BEST</span> <b id="bestText">0</b></div>
  </div>
</header>

<main id="game" class="game">
  <canvas id="canvas" class="canvas"></canvas>
  <div id="hud" class="hud">TAP AT CORNER</div>
  <div id="tapZone" class="tap-zone"></div>
  <div id="judge" class="judge">DRIFT!</div>
  <div id="flash" class="flash"></div>
</main>

<section id="startOverlay" class="overlay">
  <div class="card">
    <h2>Tap Drift</h2>
    <p>자동차는 좁은 길을 자동으로 달립니다. 길이 꺾이는 순간 화면을 터치해서 방향을 바꾸세요.</p>
    <div class="difficulty">
      <button class="diff-btn" data-diff="easy">Easy</button>
      <button class="diff-btn active" data-diff="normal">Normal</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
    </div>
    <button id="startBtn" class="btn">게임 시작</button>
    <div class="howto">
      조작법: 화면 아무 곳이나 터치 = 다음 방향으로 드리프트<br>
      너무 빨리 꺾거나 늦게 꺾으면 벽에 충돌합니다.
    </div>
  </div>
</section>

<section id="resultOverlay" class="overlay hidden">
  <div class="card">
    <h2>CRASH!</h2>
    <p>벽에 부딪혔습니다.</p>
    <div class="stats">
      <div class="stat"><small>Score</small><strong id="resultScore">0</strong></div>
      <div class="stat"><small>Best</small><strong id="resultBest">0</strong></div>
      <div class="stat"><small>Distance</small><strong id="resultDistance">0m</strong></div>
      <div class="stat"><small>Speed</small><strong id="resultSpeed">0</strong></div>
    </div>
    <button id="retryBtn" class="btn">다시 하기</button>
    <button id="homeBtn" class="btn sub-btn">처음 화면</button>
  </div>
</section>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const game=document.getElementById("game");
const tapZone=document.getElementById("tapZone");
const startOverlay=document.getElementById("startOverlay");
const resultOverlay=document.getElementById("resultOverlay");
const startBtn=document.getElementById("startBtn");
const retryBtn=document.getElementById("retryBtn");
const homeBtn=document.getElementById("homeBtn");
const scoreText=document.getElementById("scoreText");
const bestText=document.getElementById("bestText");
const resultScore=document.getElementById("resultScore");
const resultBest=document.getElementById("resultBest");
const resultDistance=document.getElementById("resultDistance");
const resultSpeed=document.getElementById("resultSpeed");
const hud=document.getElementById("hud");
const judge=document.getElementById("judge");
const flash=document.getElementById("flash");

let W=0,H=0,dpr=1;
let running=false;
let raf=null;
let last=0;
let difficulty="normal";
let best=Number(localStorage.getItem("tap-drift-best")||0);

let car, path, currentSeg, nextTurnIndex, camera, score, distance, speed, roadWidth, totalTime;
let particles=[];

const diff={
  easy:{speed:145,width:86,accel:2.5,turnWindow:64},
  normal:{speed:175,width:76,accel:3.6,turnWindow:54},
  hard:{speed:210,width:68,accel:5.0,turnWindow:44}
};

function resize(){
  const rect=game.getBoundingClientRect();
  W=rect.width; H=rect.height; dpr=window.devicePixelRatio||1;
  canvas.width=Math.floor(W*dpr); canvas.height=Math.floor(H*dpr);
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",resize);
resize();

function makePath(){
  const dirs=[
    {x:0,y:-1,name:"UP"},
    {x:1,y:0,name:"RIGHT"},
    {x:0,y:1,name:"DOWN"},
    {x:-1,y:0,name:"LEFT"}
  ];
  const pts=[{x:0,y:0}];
  let dir=0;
  let len=260;
  for(let i=0;i<140;i++){
    const p=pts[pts.length-1];
    const d=dirs[dir];
    const next={x:p.x+d.x*len,y:p.y+d.y*len};
    pts.push(next);
    const turn=Math.random()<0.5?-1:1;
    dir=(dir+turn+4)%4;
    len=190+Math.random()*170-Math.min(i,45)*1.3;
    len=Math.max(125,len);
  }
  return pts;
}

function segmentInfo(i){
  const a=path[i],b=path[i+1];
  const dx=b.x-a.x,dy=b.y-a.y;
  const len=Math.hypot(dx,dy);
  return {a,b,dx,dy,len,ux:dx/len,uy:dy/len};
}

function resetGame(){
  const cfg=diff[difficulty];
  path=makePath();
  currentSeg=0;
  nextTurnIndex=1;
  score=0; distance=0; totalTime=0;
  speed=cfg.speed;
  roadWidth=cfg.width;
  particles=[];
  const s=segmentInfo(0);
  car={
    x:s.a.x,
    y:s.a.y,
    dirX:s.ux,
    dirY:s.uy,
    angle:Math.atan2(s.uy,s.ux),
    targetSeg:0,
    alive:true
  };
  camera={x:car.x,y:car.y};
  updateTexts();
}

function startGame(){
  resetGame();
  startOverlay.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  running=true;
  last=performance.now();
  raf=requestAnimationFrame(loop);
}

function loop(now){
  if(!running)return;
  const dt=Math.min(0.033,(now-last)/1000);
  last=now;
  update(dt);
  draw();
  raf=requestAnimationFrame(loop);
}

function update(dt){
  totalTime+=dt;
  const cfg=diff[difficulty];
  speed+=cfg.accel*dt;
  distance+=speed*dt/10;
  score=Math.floor(distance*3 + totalTime*8);

  car.x+=car.dirX*speed*dt;
  car.y+=car.dirY*speed*dt;

  camera.x+=(car.x-camera.x)*0.12;
  camera.y+=(car.y-camera.y)*0.12;

  const distToRoad=distanceToPath(car.x,car.y);
  if(distToRoad>roadWidth/2-10){
    crash();
    return;
  }

  updateParticles(dt);
  updateTexts();

  const turnInfo=getNextCornerInfo();
  if(turnInfo){
    const d=turnInfo.dist;
    if(d<cfg.turnWindow*1.15){
      hud.textContent="TAP NOW";
      hud.style.color="#fff";
      hud.style.boxShadow="0 0 18px rgba(192,0,1,.45)";
    }else{
      hud.textContent="WAIT";
      hud.style.color="#aaa";
      hud.style.boxShadow="none";
    }
  }
}

function distanceToPath(x,y){
  let best=Infinity;
  for(let i=Math.max(0,currentSeg-2);i<Math.min(path.length-1,currentSeg+4);i++){
    const a=path[i],b=path[i+1];
    best=Math.min(best,pointSegmentDistance(x,y,a.x,a.y,b.x,b.y));
  }
  return best;
}

function pointSegmentDistance(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const l2=dx*dx+dy*dy;
  if(l2===0)return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/l2;
  t=Math.max(0,Math.min(1,t));
  const x=x1+t*dx,y=y1+t*dy;
  return Math.hypot(px-x,py-y);
}

function getNextCornerInfo(){
  if(currentSeg>=path.length-2)return null;
  const seg=segmentInfo(currentSeg);
  const corner=seg.b;
  const dist=Math.hypot(corner.x-car.x,corner.y-car.y);
  return {corner,dist,seg};
}

function tap(){
  if(!running)return;
  const cfg=diff[difficulty];
  const info=getNextCornerInfo();
  if(!info)return;
  const d=info.dist;
  if(d<=cfg.turnWindow){
    currentSeg++;
    const ns=segmentInfo(currentSeg);
    car.x=ns.a.x;
    car.y=ns.a.y;
    car.dirX=ns.ux;
    car.dirY=ns.uy;
    car.angle=Math.atan2(ns.uy,ns.ux);
    score+=50;
    spawnDriftParticles(car.x,car.y);
    showJudge("DRIFT!");
  }else{
    showJudge("TOO EARLY");
    crash();
  }
}

function crash(){
  running=false;
  cancelAnimationFrame(raf);
  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");
  best=Math.max(best,score);
  localStorage.setItem("tap-drift-best",String(best));
  resultScore.textContent=score.toLocaleString();
  resultBest.textContent=best.toLocaleString();
  resultDistance.textContent=Math.floor(distance)+"m";
  resultSpeed.textContent=Math.floor(speed);
  setTimeout(()=>resultOverlay.classList.remove("hidden"),350);
}

function showJudge(text){
  judge.textContent=text;
  judge.classList.remove("show");
  void judge.offsetWidth;
  judge.classList.add("show");
}

function spawnDriftParticles(x,y){
  for(let i=0;i<18;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*140-car.dirX*80,
      vy:(Math.random()-.5)*140-car.dirY*80,
      life:.45+Math.random()*.3,
      max:.75
    });
  }
}

function updateParticles(dt){
  particles=particles.filter(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    return p.life>0;
  });
}

function worldToScreen(x,y){
  return {x:W/2+(x-camera.x),y:H*0.62+(y-camera.y)};
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  drawRoad();
  drawParticles();
  drawCar();
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle="rgba(255,255,255,.035)";
  ctx.lineWidth=1;
  const step=40;
  const ox=(-camera.x%step+step)%step;
  const oy=(-camera.y%step+step)%step;
  for(let x=ox;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}

function drawRoad(){
  ctx.save();
  ctx.lineCap="round";
  ctx.lineJoin="round";

  ctx.beginPath();
  for(let i=0;i<path.length;i++){
    const p=worldToScreen(path[i].x,path[i].y);
    if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
  }
  ctx.strokeStyle="rgba(192,0,1,.32)";
  ctx.lineWidth=roadWidth+20;
  ctx.shadowColor="rgba(192,0,1,.55)";
  ctx.shadowBlur=22;
  ctx.stroke();

  ctx.shadowBlur=0;
  ctx.beginPath();
  for(let i=0;i<path.length;i++){
    const p=worldToScreen(path[i].x,path[i].y);
    if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
  }
  ctx.strokeStyle="#262626";
  ctx.lineWidth=roadWidth;
  ctx.stroke();

  ctx.beginPath();
  for(let i=0;i<path.length;i++){
    const p=worldToScreen(path[i].x,path[i].y);
    if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
  }
  ctx.strokeStyle="rgba(255,255,255,.17)";
  ctx.lineWidth=2;
  ctx.setLineDash([16,18]);
  ctx.stroke();
  ctx.setLineDash([]);

  const info=getNextCornerInfo();
  if(info){
    const p=worldToScreen(info.corner.x,info.corner.y);
    ctx.beginPath();
    ctx.arc(p.x,p.y,diff[difficulty].turnWindow,0,Math.PI*2);
    ctx.strokeStyle=info.dist<diff[difficulty].turnWindow?"rgba(95,255,168,.65)":"rgba(255,255,255,.16)";
    ctx.lineWidth=2;
    ctx.stroke();
  }

  ctx.restore();
}

function drawCar(){
  const p=worldToScreen(car.x,car.y);
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(car.angle);
  ctx.shadowColor="rgba(255,255,255,.3)";
  ctx.shadowBlur=12;

  ctx.fillStyle="#f3f3f3";
  roundRect(ctx,-18,-11,36,22,6);
  ctx.fill();

  ctx.fillStyle="#c00001";
  roundRect(ctx,-8,-9,18,18,5);
  ctx.fill();

  ctx.fillStyle="#151515";
  ctx.fillRect(-13,-14,7,4);
  ctx.fillRect(-13,10,7,4);
  ctx.fillRect(7,-14,7,4);
  ctx.fillRect(7,10,7,4);

  ctx.fillStyle="#ffd35f";
  ctx.fillRect(14,-7,4,4);
  ctx.fillRect(14,3,4,4);
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawParticles(){
  ctx.save();
  for(const p of particles){
    const s=worldToScreen(p.x,p.y);
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle="#ffffff";
    ctx.beginPath();
    ctx.arc(s.x,s.y,2.5,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function updateTexts(){
  scoreText.textContent=score.toLocaleString();
  bestText.textContent=best.toLocaleString();
}

tapZone.addEventListener("pointerdown",e=>{e.preventDefault();tap();});
startBtn.addEventListener("click",startGame);
retryBtn.addEventListener("click",startGame);
homeBtn.addEventListener("click",()=>{resultOverlay.classList.add("hidden");startOverlay.classList.remove("hidden")});
document.querySelectorAll(".diff-btn").forEach(btn=>btn.addEventListener("click",()=>{
  difficulty=btn.dataset.diff;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}));
document.addEventListener("visibilitychange",()=>{if(document.hidden&&running)crash()});
if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})})}
resetGame();
draw();
</script>
</body>
</html>
