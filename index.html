<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#111111" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Coin Catcher" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<title>Coin Catcher</title>
<style>
:root{--bg:#080808;--panel:#121212;--text:#f7f7f7;--muted:#aaa;--accent:#c00001;--coin:#ffd35f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overscroll-behavior:none}
body{min-height:100dvh;display:flex;flex-direction:column}
.topbar{padding:max(12px,env(safe-area-inset-top)) 14px 10px;background:#111;border-bottom:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;z-index:5}
.title h1{margin:0;font-size:18px;letter-spacing:-.05em}.title p{margin:2px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw}
.score-box{text-align:right;font-size:13px;line-height:1.38;font-weight:950}.score-box span{color:var(--muted);font-weight:700}
.game{position:relative;flex:1;min-height:0;overflow:hidden;background:radial-gradient(circle at 50% 0%,rgba(255,211,95,.14),transparent 28%),radial-gradient(circle at 10% 80%,rgba(192,0,1,.13),transparent 30%),radial-gradient(circle at 90% 75%,rgba(95,255,168,.11),transparent 28%),#080808;touch-action:none}
.level-banner{position:absolute;left:50%;top:16px;transform:translateX(-50%);padding:8px 13px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:900;color:#ddd;z-index:4;pointer-events:none}
.falling{position:absolute;display:grid;place-items:center;transform:translate(-50%,-50%);z-index:2;will-change:transform;pointer-events:none}
.coin{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff6bd 0%,#ffe16e 22%,#ffc02b 62%,#b67606 100%);border:3px solid #f7b81f;box-shadow:inset 0 0 0 3px rgba(255,255,255,.18),0 0 16px rgba(255,211,95,.42);position:relative;animation:coinSpin .7s linear infinite}
.coin:after{content:"₩";position:absolute;inset:0;display:grid;place-items:center;color:#7b4b00;font-weight:1000;font-size:23px;text-shadow:0 1px 0 rgba(255,255,255,.35)}
@keyframes coinSpin{0%{transform:rotateY(0deg) rotateZ(0)}100%{transform:rotateY(360deg) rotateZ(10deg)}}
.rock{width:45px;height:40px;background:radial-gradient(circle at 35% 25%,#aaa,#6d6d6d 45%,#3e3e3e 100%);clip-path:polygon(21% 5%,72% 10%,96% 42%,75% 92%,24% 88%,4% 46%);box-shadow:0 6px 14px rgba(0,0,0,.45);animation:rockSpin 1.1s linear infinite}
@keyframes rockSpin{to{transform:rotate(360deg)}}
.heart-item{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff,#ff7a9e 35%,#d6003c 100%);box-shadow:0 0 18px rgba(255,60,110,.55);position:relative;animation:pulse .75s ease infinite alternate}.heart-item:after{content:"♥";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-weight:1000;font-size:25px}@keyframes pulse{from{transform:scale(.94)}to{transform:scale(1.08)}}
.basket{position:absolute;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));width:106px;height:58px;transform:translateX(-50%);z-index:3;touch-action:none}
.basket-body{position:absolute;left:0;right:0;bottom:0;height:42px;border-radius:8px 8px 24px 24px;background:linear-gradient(180deg,#eee,#bdbdbd);border:3px solid #f8f8f8;box-shadow:inset 0 -8px 0 rgba(0,0,0,.16),0 8px 18px rgba(0,0,0,.45)}
.basket-body:before{content:"";position:absolute;left:12px;right:12px;top:9px;height:4px;border-radius:999px;background:rgba(0,0,0,.22);box-shadow:0 10px 0 rgba(0,0,0,.14)}
.basket-handle{position:absolute;left:22px;right:22px;top:0;height:30px;border:5px solid #eaeaea;border-bottom:0;border-radius:999px 999px 0 0;opacity:.95}
.flash{position:absolute;inset:0;background:rgba(192,0,1,.22);opacity:0;pointer-events:none;z-index:6}.flash.show{animation:damage .25s ease}@keyframes damage{0%,100%{opacity:0}40%{opacity:1}}
.float-text{position:absolute;font-size:24px;font-weight:1000;z-index:8;pointer-events:none;animation:floatUp .65s ease forwards;text-shadow:0 4px 16px rgba(0,0,0,.8)}@keyframes floatUp{from{opacity:0;transform:translate(-50%,0) scale(.8)}20%{opacity:1}to{opacity:0;transform:translate(-50%,-54px) scale(1.08)}}
.overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at top,rgba(255,211,95,.2),transparent 32%),linear-gradient(180deg,#181818,#050505)}.overlay.hidden{display:none}
.card{width:min(440px,100%);background:rgba(18,18,18,.96);border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:22px;box-shadow:0 22px 80px rgba(0,0,0,.55)}
.card h2{margin:0 0 6px;font-size:30px;letter-spacing:-.07em}.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.btn{width:100%;border:0;border-radius:16px;padding:14px 12px;background:var(--accent);color:#fff;font-weight:950;font-size:16px;margin-top:10px;cursor:pointer}.sub-btn{background:#2d2d2d;font-size:14px;padding:12px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}.stat{background:#222;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px}.stat small{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.stat strong{font-size:21px}
.howto{margin-top:12px;color:#999;font-size:12px;line-height:1.55}.difficulty{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.diff-btn{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 6px;background:#252525;color:#ddd;font-size:13px;font-weight:900}.diff-btn.active{background:var(--accent);color:#fff;border-color:transparent}
@media (min-width:900px){body{max-width:520px;margin:0 auto;border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}}
</style>
</head>
<body>
<header class="topbar"><div class="title"><h1>Coin Catcher</h1><p>동전은 받고, 돌은 피하세요</p></div><div class="score-box"><div><span>SCORE</span> <b id="scoreText">0</b></div><div><span>♥</span> <b id="lifeText">3</b> <span>LV</span> <b id="levelText">1</b></div></div></header>
<main id="game" class="game"><div id="levelBanner" class="level-banner">LEVEL 1</div><div id="basket" class="basket"><div class="basket-handle"></div><div class="basket-body"></div></div><div id="flash" class="flash"></div></main>
<section id="startOverlay" class="overlay"><div class="card"><h2>Coin Catcher</h2><p>떨어지는 동전은 받고, 돌은 피하세요. 시간이 지날수록 더 빠르고 많이 떨어집니다.</p><div class="difficulty"><button class="diff-btn" data-diff="easy">Easy</button><button class="diff-btn active" data-diff="normal">Normal</button><button class="diff-btn" data-diff="hard">Hard</button></div><button id="startBtn" class="btn">게임 시작</button><div class="howto">조작법: 손가락으로 바구니를 좌우로 움직이세요.<br>🪙 동전 = 점수 / 🪨 돌 = 생명 감소 / ♥ 하트 = 생명 회복</div></div></section>
<section id="resultOverlay" class="overlay hidden"><div class="card"><h2>GAME OVER</h2><p>최종 결과입니다.</p><div class="stats"><div class="stat"><small>Score</small><strong id="resultScore">0</strong></div><div class="stat"><small>Best</small><strong id="bestScore">0</strong></div><div class="stat"><small>Level</small><strong id="resultLevel">1</strong></div><div class="stat"><small>Coins</small><strong id="resultCoins">0</strong></div></div><button id="retryBtn" class="btn">다시 하기</button><button id="homeBtn" class="btn sub-btn">처음 화면</button></div></section>
<script>
const game=document.getElementById("game"),basket=document.getElementById("basket"),scoreText=document.getElementById("scoreText"),lifeText=document.getElementById("lifeText"),levelText=document.getElementById("levelText"),levelBanner=document.getElementById("levelBanner"),flash=document.getElementById("flash"),startOverlay=document.getElementById("startOverlay"),resultOverlay=document.getElementById("resultOverlay"),startBtn=document.getElementById("startBtn"),retryBtn=document.getElementById("retryBtn"),homeBtn=document.getElementById("homeBtn"),resultScore=document.getElementById("resultScore"),bestScore=document.getElementById("bestScore"),resultLevel=document.getElementById("resultLevel"),resultCoins=document.getElementById("resultCoins");
let running=false,animationId=null,lastTime=0,spawnTimer=0,score=0,life=3,level=1,coins=0,difficulty="normal",basketX=0,items=[],elapsed=0,itemId=0,audioCtx=null;
const diffConfig={easy:{speed:150,spawn:.9,rockRate:.18},normal:{speed:190,spawn:.72,rockRate:.24},hard:{speed:230,spawn:.55,rockRate:.31}};
function beep(type){try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(type==="coin"){o.frequency.setValueAtTime(880,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(1320,audioCtx.currentTime+.12);g.gain.setValueAtTime(.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.14)}else if(type==="rock"){o.frequency.setValueAtTime(120,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+.18);g.gain.setValueAtTime(.12,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.2)}else{o.frequency.setValueAtTime(440,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(880,audioCtx.currentTime+.2);g.gain.setValueAtTime(.08,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.25)}o.start();o.stop(audioCtx.currentTime+.25)}catch(e){}}
function startGame(){resetGame();startOverlay.classList.add("hidden");resultOverlay.classList.add("hidden");running=true;lastTime=performance.now();beep("start");animationId=requestAnimationFrame(loop)}
function resetGame(){running=false;cancelAnimationFrame(animationId);items.forEach(i=>i.el.remove());items=[];score=0;life=3;level=1;coins=0;elapsed=0;spawnTimer=0;itemId=0;basketX=game.clientWidth/2;updateBasket();updateUI()}
function loop(now){if(!running)return;const dt=Math.min(.033,(now-lastTime)/1000);lastTime=now;elapsed+=dt;const old=level;level=Math.max(1,Math.floor(elapsed/12)+1);if(level!==old)showFloat(game.clientWidth/2,90,`LEVEL ${level}`,"#fff");const cfg=diffConfig[difficulty],spawnInterval=Math.max(.22,cfg.spawn-level*.045);spawnTimer+=dt;while(spawnTimer>=spawnInterval){spawnTimer-=spawnInterval;spawnItem();if(level>=4&&Math.random()<.22)spawnItem();if(level>=7&&Math.random()<.14)spawnItem()}updateItems(dt);updateUI();animationId=requestAnimationFrame(loop)}
function spawnItem(){const cfg=diffConfig[difficulty],w=game.clientWidth,margin=30,x=margin+Math.random()*(w-margin*2);let type="coin";const rockRate=Math.min(.52,cfg.rockRate+level*.025),heartRate=life<3?.035:.012,r=Math.random();if(r<heartRate)type="heart";else if(r<heartRate+rockRate)type="rock";const el=document.createElement("div");el.className="falling";const inner=document.createElement("div");inner.className=type==="coin"?"coin":type==="rock"?"rock":"heart-item";el.appendChild(inner);game.appendChild(el);const speed=cfg.speed+level*22+Math.random()*75;items.push({id:itemId++,type,x,y:-50,size:type==="rock"?46:44,speed,el})}
function updateItems(dt){const br=getBasketRect(),h=game.clientHeight;for(const item of [...items]){item.y+=item.speed*dt;item.el.style.transform=`translate(${item.x}px,${item.y}px)`;if(isColliding(item,br)){collectItem(item);continue}if(item.y>h+60)removeItem(item)}}
function getBasketRect(){const w=106,h=48,bottom=18;return{left:basketX-w/2,right:basketX+w/2,top:game.clientHeight-bottom-h,bottom:game.clientHeight-bottom+4}}
function isColliding(item,r){const half=item.size/2;return item.x+half>r.left&&item.x-half<r.right&&item.y+half>r.top&&item.y-half<r.bottom}
function collectItem(item){if(item.type==="coin"){const gain=10+level*2;score+=gain;coins++;showFloat(item.x,item.y,`+${gain}`,"#ffd35f");beep("coin")}else if(item.type==="rock"){life--;showFloat(item.x,item.y,"-♥","#ff5f7c");flash.classList.remove("show");void flash.offsetWidth;flash.classList.add("show");beep("rock");if(life<=0){removeItem(item);endGame();return}}else{life=Math.min(3,life+1);score+=30;showFloat(item.x,item.y,"+♥","#ff7aa2");beep("coin")}removeItem(item)}
function removeItem(item){item.el.remove();items=items.filter(i=>i.id!==item.id)}
function showFloat(x,y,text,color){const el=document.createElement("div");el.className="float-text";el.textContent=text;el.style.left=`${x}px`;el.style.top=`${y}px`;el.style.color=color;game.appendChild(el);setTimeout(()=>el.remove(),700)}
function updateUI(){scoreText.textContent=score.toLocaleString();lifeText.textContent=life;levelText.textContent=level;levelBanner.textContent=`LEVEL ${level} · SPEED ${Math.round(diffConfig[difficulty].speed+level*22)}`}
function updateBasket(){const minX=54,maxX=game.clientWidth-54;basketX=Math.max(minX,Math.min(maxX,basketX||game.clientWidth/2));basket.style.left=`${basketX}px`}
function moveBasketFromEvent(e){if(!running)return;const rect=game.getBoundingClientRect();basketX=e.clientX-rect.left;updateBasket()}
function endGame(){running=false;cancelAnimationFrame(animationId);const best=Math.max(Number(localStorage.getItem("coin-catcher-best")||0),score);localStorage.setItem("coin-catcher-best",String(best));resultScore.textContent=score.toLocaleString();bestScore.textContent=best.toLocaleString();resultLevel.textContent=level;resultCoins.textContent=coins;resultOverlay.classList.remove("hidden")}
document.querySelectorAll(".diff-btn").forEach(btn=>btn.addEventListener("click",()=>{difficulty=btn.dataset.diff;document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active")}));
startBtn.addEventListener("click",startGame);retryBtn.addEventListener("click",startGame);homeBtn.addEventListener("click",()=>{resultOverlay.classList.add("hidden");startOverlay.classList.remove("hidden")});
game.addEventListener("pointerdown",e=>{e.preventDefault();moveBasketFromEvent(e)});game.addEventListener("pointermove",e=>{e.preventDefault();moveBasketFromEvent(e)});window.addEventListener("resize",updateBasket);document.addEventListener("visibilitychange",()=>{if(document.hidden&&running)endGame()});updateBasket();updateUI();
if("serviceWorker"in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(()=>{})})}
</script>
</body>
</html>
