<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>Tap Drift</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#070707"/>
<style>
:root{--bg:#070707;--panel:#151515;--accent:#c00001;--text:#f4f4f4;--muted:#999}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{touch-action:none;user-select:none}
.topbar{position:fixed;z-index:20;top:0;left:0;right:0;height:68px;padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(180deg,rgba(7,7,7,.92),rgba(7,7,7,0))}
.title h1{margin:0;font-size:18px;letter-spacing:-.04em}
.title p{margin:2px 0 0;color:var(--muted);font-size:11px}
.scorebox{text-align:right;font-weight:900}
.scorebox div{font-size:12px;color:#ddd;line-height:1.35}
.scorebox span{font-size:10px;color:#888;margin-right:3px}
.game{position:fixed;inset:0}
.canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at 50% 24%,#151515 0%,#070707 48%,#030303 100%)}
.tap-zone{position:absolute;inset:0;z-index:10}
.judge{position:absolute;z-index:18;left:50%;top:25%;transform:translate(-50%,-50%) scale(.9);font-size:37px;font-weight:1000;letter-spacing:-.05em;color:#fff;text-shadow:0 0 18px rgba(192,0,1,.85);opacity:0;pointer-events:none}
.judge.show{animation:judge .55s ease}
@keyframes judge{0%{opacity:0;transform:translate(-50%,-50%) scale(.78)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}72%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%) scale(.95)}}
.overlay{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:22px}
.overlay.hidden{display:none}
.card{width:min(440px,100%);background:rgba(18,18,18,.97);border:1px solid rgba(255,255,255,.1);border-radius:26px;padding:22px;box-shadow:0 22px 80px rgba(0,0,0,.55)}
.card h2{margin:0 0 6px;font-size:31px;letter-spacing:-.08em}
.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.btn{width:100%;border:0;border-radius:16px;padding:14px 12px;background:var(--accent);color:#fff;font-weight:950;font-size:16px;margin-top:10px;cursor:pointer}
.sub-btn{background:#2d2d2d;font-size:14px;padding:12px}
.howto{margin-top:12px;color:#999;font-size:12px;line-height:1.65}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#222;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px}
.stat small{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
.stat strong{font-size:21px}
.flash{position:absolute;inset:0;background:rgba(192,0,1,.25);opacity:0;pointer-events:none;z-index:19}
.flash.show{animation:damage .32s ease}
@keyframes damage{0%,100%{opacity:0}40%{opacity:1}}
.hold{position:absolute;z-index:16;left:50%;bottom:95px;transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(192,0,1,.82);color:#fff;font-size:12px;font-weight:950;opacity:0;pointer-events:none;box-shadow:0 0 18px rgba(192,0,1,.45)}
.hold.show{opacity:1}
@media (min-width:900px){body{max-width:520px;margin:0 auto;border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}}
</style>
</head>
<body tabindex="0">
<header class="topbar">
  <div class="title">
    <h1>Tap Drift</h1>
    <p>곡선 코너 드리프트</p>
  </div>
  <div class="scorebox">
    <div><span>SCORE</span> <b id="scoreText">0</b></div>
    <div><span>BEST</span> <b id="bestText">0</b></div>
  </div>
</header>

<main id="game" class="game">
  <canvas id="canvas" class="canvas"></canvas>
  <div id="tapZone" class="tap-zone"></div>
  <div id="judge" class="judge">DRIFT!</div>
  <div id="holdHint" class="hold">HOLD DRIFT</div>
  <div id="flash" class="flash"></div>
</main>

<section id="startOverlay" class="overlay">
  <div class="card">
    <h2>Tap Drift</h2>
    <p>직각 코너와 1/4·2/4·3/4 원형 코너가 랜덤으로 섞입니다.</p>
    <button id="startBtn" class="btn">게임 시작</button>
    <div class="howto">
      직각 코너: 타이밍 맞춰 한 번 터치 / 스페이스바<br>
      원형 코너: 터치 또는 스페이스바를 누르고 있는 동안 드리프트<br>
      원형 코너를 다 돌기 전에 떼면 충돌합니다.
    </div>
  </div>
</section>

<section id="resultOverlay" class="overlay hidden">
  <div class="card">
    <h2>CRASH!</h2>
    <p id="crashReason">외길을 벗어났습니다.</p>
    <div class="stats">
      <div class="stat"><small>Score</small><strong id="resultScore">0</strong></div>
      <div class="stat"><small>Best</small><strong id="resultBest">0</strong></div>
      <div class="stat"><small>Distance</small><strong id="resultDistance">0m</strong></div>
      <div class="stat"><small>Speed</small><strong id="resultSpeed">0</strong></div>
      <div class="stat"><small>Perfect</small><strong id="resultPerfect">0</strong></div>
      <div class="stat"><small>Good</small><strong id="resultGood">0</strong></div>
    </div>
    <button id="retryBtn" class="btn">다시 하기</button>
    <button id="homeBtn" class="btn sub-btn">처음 화면</button>
  </div>
</section>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const tapZone=document.getElementById("tapZone");
const startOverlay=document.getElementById("startOverlay");
const resultOverlay=document.getElementById("resultOverlay");
const startBtn=document.getElementById("startBtn");
const retryBtn=document.getElementById("retryBtn");
const homeBtn=document.getElementById("homeBtn");
const scoreText=document.getElementById("scoreText");
const bestText=document.getElementById("bestText");
const resultScore=document.getElementById("resultScore");
const resultBest=document.getElementById("resultBest");
const resultDistance=document.getElementById("resultDistance");
const resultSpeed=document.getElementById("resultSpeed");
const resultPerfect=document.getElementById("resultPerfect");
const resultGood=document.getElementById("resultGood");
const crashReason=document.getElementById("crashReason");
const judge=document.getElementById("judge");
const holdHint=document.getElementById("holdHint");
const flash=document.getElementById("flash");

let W=0,H=0,dpr=1;
let running=false,raf=null,last=0;
let best=Number(localStorage.getItem("tap-drift-curved-best")||0);

let segments=[],segIndex=0,segS=0,car,camera,score,distance,speed,roadWidth,totalTime,stage,perfectCount,goodCount;
let inputDown=false,spacePressed=false,turnPrepared=false,turnGrade="GOOD",arcActive=false,arcGrade="GOOD";
let particles=[];

const stages={
  easy:{start:0,speed:124,width:50,accel:3.5,turnWindow:28,label:"EASY"},
  normal:{start:28,speed:150,width:45,accel:5.0,turnWindow:27,label:"NORMAL"},
  hard:{start:62,speed:176,width:40,accel:7.0,turnWindow:26,label:"HARD"}
};

function resize(){
  dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  W=Math.floor(innerWidth*dpr);
  H=Math.floor(innerHeight*dpr);
  canvas.width=W;canvas.height=H;
}
addEventListener("resize",resize,{passive:true});
resize();

function rand(a,b){return a+Math.random()*(b-a)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function unit(theta){return{x:Math.cos(theta),y:Math.sin(theta)}}
function rightNormal(u){return{x:-u.y,y:u.x}}

function makeMap(){
  const segs=[];
  let p={x:0,y:0};
  let theta=-Math.PI/2;
  const xLimit=230;

  for(let i=0;i<150;i++){
    const progress=Math.min(1,i/80);
    const len=rand(105-progress*34,190-progress*48);
    const u=unit(theta);
    const a={x:p.x,y:p.y};
    const b={x:p.x+u.x*len,y:p.y+u.y*len};

    let sign;
    if(b.x>xLimit*.55)sign=-1;
    else if(b.x<-xLimit*.55)sign=1;
    else sign=Math.random()<.5?-1:1;

    const useArc=Math.random()<.72;
    const line={type:"line",a,b,theta,len,turn:null,prepared:false};
    p=b;

    if(useArc){
      const frac=pick([1,2,3]);
      const angle=frac*Math.PI/2;
      const radius=rand(42,72);
      const ru=unit(theta);
      const rn=rightNormal(ru);
      const c={x:p.x+rn.x*sign*radius,y:p.y+rn.y*sign*radius};
      const startAngle=Math.atan2(p.y-c.y,p.x-c.x);
      const delta=-sign*angle;
      const endAngle=startAngle+delta;
      const end={x:c.x+Math.cos(endAngle)*radius,y:c.y+Math.sin(endAngle)*radius};
      const nextTheta=theta+sign*angle;
      line.turn={type:"arc",angle,frac,sign,radius};
      segs.push(line);
      segs.push({
        type:"arc",
        c,radius,startAngle,delta,thetaStart:theta,thetaEnd:nextTheta,
        len:radius*Math.abs(angle),
        frac,sign,a:p,b:end
      });
      p=end;
      theta=nextTheta;
    }else{
      line.turn={type:"sharp",sign,angle:Math.PI/2};
      segs.push(line);
      theta+=sign*Math.PI/2;
    }
  }

  const u=unit(theta);
  segs.push({type:"line",a:{x:p.x,y:p.y},b:{x:p.x+u.x*500,y:p.y+u.y*500},theta,len:500,turn:null});
  return segs;
}

function getCurrentCfg(){
  if(totalTime>=stages.hard.start)return stages.hard;
  if(totalTime>=stages.normal.start)return stages.normal;
  return stages.easy;
}

function segPos(seg,s){
  s=Math.max(0,Math.min(seg.len,s));
  if(seg.type==="line"){
    const t=s/seg.len;
    return{x:seg.a.x+(seg.b.x-seg.a.x)*t,y:seg.a.y+(seg.b.y-seg.a.y)*t,theta:seg.theta};
  }
  const t=s/seg.len;
  const ang=seg.startAngle+seg.delta*t;
  return{x:seg.c.x+Math.cos(ang)*seg.radius,y:seg.c.y+Math.sin(ang)*seg.radius,theta:seg.thetaStart+seg.sign*(Math.abs(seg.delta)*t)};
}

function sampleSegment(seg,step=12){
  const pts=[];
  const n=Math.max(2,Math.ceil(seg.len/step));
  for(let i=0;i<=n;i++){
    const p=segPos(seg,seg.len*i/n);
    pts.push(p);
  }
  return pts;
}

function resetGame(){
  segments=makeMap();
  segIndex=0;segS=0;
  score=0;distance=0;totalTime=0;perfectCount=0;goodCount=0;
  speed=stages.easy.speed;roadWidth=stages.easy.width;
  inputDown=false;spacePressed=false;turnPrepared=false;turnGrade="GOOD";arcActive=false;arcGrade="GOOD";
  particles=[];
  const p=segPos(segments[0],0);
  car={x:p.x,y:p.y,theta:p.theta};
  camera={x:car.x,y:car.y};
  updateTexts();
  draw();
}

function startGame(){
  resetGame();
  document.body.focus();
  startOverlay.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  running=true;
  last=performance.now();
  raf=requestAnimationFrame(loop);
}

function loop(now){
  if(!running)return;
  const dt=Math.min(.034,(now-last)/1000);
  last=now;
  update(dt);
  draw();
  raf=requestAnimationFrame(loop);
}

function update(dt){
  totalTime+=dt;
  const cfg=getCurrentCfg();
  speed+=(cfg.accel*dt);
  roadWidth+=(cfg.width-roadWidth)*Math.min(1,dt*2.5);

  const seg=segments[segIndex];
  if(!seg){crash("길이 끝났습니다.");return}

  if(seg.type==="arc"){
    if(!inputDown){
      crash("원형 코너를 다 돌기 전에 손을 뗐습니다.");
      return;
    }
    arcActive=true;
    holdHint.classList.add("show");
  }else{
    arcActive=false;
    holdHint.classList.remove("show");
  }

  let move=speed*dt;
  while(move>0 && running){
    const cur=segments[segIndex];
    const remain=cur.len-segS;
    if(move<remain){
      segS+=move;
      move=0;
    }else{
      move-=remain;
      segS=cur.len;
      finishSegment(cur);
    }
  }

  const p=segPos(segments[segIndex],segS);
  car.x=p.x;car.y=p.y;car.theta=p.theta;
  camera.x+=(car.x-camera.x)*Math.min(1,dt*7.5);
  camera.y+=(car.y-camera.y)*Math.min(1,dt*7.5);

  distance+=speed*dt*.09;
  score+=Math.floor(dt*6);
  updateParticles(dt);
  updateTexts();
}

function finishSegment(seg){
  if(seg.type==="line"){
    if(seg.turn?.type==="sharp"){
      if(!turnPrepared){
        crash("직각 코너 타이밍을 놓쳤습니다.");
        return;
      }
      awardTurn(turnGrade,"SHARP");
      turnPrepared=false;
      const next=segments[segIndex+1];
      if(!next){return}
      segIndex++;
      segS=0;
      return;
    }

    if(seg.turn?.type==="arc"){
      if(!inputDown){
        crash("원형 코너 시작 전에 터치를 누르고 있어야 합니다.");
        return;
      }
      if(!turnPrepared){
        // 코너에 딱 붙어서 누른 경우를 살짝 허용
        turnGrade="GOOD";
      }
      arcGrade=turnGrade;
      turnPrepared=false;
      segIndex++;
      segS=0;
      arcActive=true;
      return;
    }

    segIndex++;
    segS=0;
    return;
  }

  if(seg.type==="arc"){
    awardTurn(arcGrade,`${seg.frac}/4 ARC`);
    arcActive=false;
    holdHint.classList.remove("show");
    segIndex++;
    segS=0;
  }
}

function upcomingTurnInfo(){
  const seg=segments[segIndex];
  if(!seg || seg.type!=="line" || !seg.turn)return null;
  return{seg,remaining:seg.len-segS,turn:seg.turn};
}

function press(){
  if(!running)return;
  inputDown=true;
  document.body.focus();

  const info=upcomingTurnInfo();
  if(!info)return;

  const cfg=getCurrentCfg();
  const remaining=info.remaining;

  if(remaining>cfg.turnWindow){
    showJudge("EARLY");
    crash("너무 빨리 드리프트했습니다.");
    return;
  }

  if(remaining<-cfg.turnWindow*.35){
    showJudge("LATE");
    crash("드리프트가 늦었습니다.");
    return;
  }

  const accuracy=Math.abs(remaining);
  turnPrepared=true;
  turnGrade=accuracy<=cfg.turnWindow*.32?"PERFECT":"GOOD";

  if(info.turn.type==="sharp"){
    showJudge(turnGrade);
  }else{
    showJudge("HOLD");
    holdHint.classList.add("show");
  }
}

function release(){
  if(!inputDown)return;
  inputDown=false;
  spacePressed=false;
  if(running && segments[segIndex]?.type==="arc"){
    crash("원형 코너를 다 돌기 전에 손을 뗐습니다.");
  }
}

function awardTurn(grade,label){
  if(grade==="PERFECT"){
    perfectCount++;
    score+=label.includes("ARC")?180:120;
    spawnParticles(car.x,car.y,"perfect");
    showJudge("PERFECT");
  }else{
    goodCount++;
    score+=label.includes("ARC")?95:60;
    spawnParticles(car.x,car.y,"good");
    showJudge("GOOD");
  }
}

function crash(reason="외길을 벗어났습니다."){
  if(!running)return;
  running=false;
  cancelAnimationFrame(raf);
  holdHint.classList.remove("show");
  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  best=Math.max(best,score);
  localStorage.setItem("tap-drift-curved-best",String(best));

  crashReason.textContent=reason;
  resultScore.textContent=score.toLocaleString();
  resultBest.textContent=best.toLocaleString();
  resultDistance.textContent=Math.floor(distance)+"m";
  resultSpeed.textContent=Math.floor(speed);
  resultPerfect.textContent=perfectCount;
  resultGood.textContent=goodCount;

  setTimeout(()=>resultOverlay.classList.remove("hidden"),330);
}

function showJudge(text){
  judge.textContent=text;
  judge.classList.remove("show");
  void judge.offsetWidth;
  judge.classList.add("show");
}

function worldToScreen(x,y){
  return{x:W/2+(x-camera.x)*dpr,y:H*.66+(y-camera.y)*dpr};
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  drawRoad();
  drawParticles();
  drawCar();
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle="rgba(255,255,255,.028)";
  ctx.lineWidth=1;
  const step=42*dpr;
  const ox=(-camera.x*dpr%step+step)%step;
  const oy=(-camera.y*dpr%step+step)%step;
  for(let x=ox;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=oy;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.restore();
}

function drawRoad(){
  ctx.save();
  ctx.lineCap="round";
  ctx.lineJoin="round";
  const start=Math.max(0,segIndex-3);
  const end=Math.min(segments.length-1,segIndex+15);

  function strokeRoad(width,color,shadow=false){
    ctx.beginPath();
    let started=false;
    for(let i=start;i<=end;i++){
      const pts=sampleSegment(segments[i],10);
      for(const wp of pts){
        const p=worldToScreen(wp.x,wp.y);
        if(!started){ctx.moveTo(p.x,p.y);started=true}else ctx.lineTo(p.x,p.y);
      }
    }
    ctx.strokeStyle=color;
    ctx.lineWidth=width*dpr;
    if(shadow){ctx.shadowColor="rgba(192,0,1,.55)";ctx.shadowBlur=16*dpr}else ctx.shadowBlur=0;
    ctx.stroke();
  }

  strokeRoad(roadWidth+12,"rgba(192,0,1,.34)",true);
  strokeRoad(roadWidth,"#202020",false);

  // upcoming curved corner marker
  const info=upcomingTurnInfo();
  if(info?.turn?.type==="arc" && info.remaining<120){
    const p=worldToScreen(info.seg.b.x,info.seg.b.y);
    ctx.shadowBlur=12*dpr;
    ctx.shadowColor="rgba(255,211,95,.8)";
    ctx.strokeStyle="rgba(255,211,95,.95)";
    ctx.lineWidth=2*dpr;
    ctx.beginPath();
    ctx.arc(p.x,p.y,8*dpr,0,Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawCar(){
  const p=worldToScreen(car.x,car.y);
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(car.theta);
  ctx.scale(dpr,dpr);
  ctx.shadowColor="rgba(255,255,255,.28)";
  ctx.shadowBlur=9;

  const carLength=34,carWidth=22;
  ctx.fillStyle="#f3f3f3";
  roundRect(-carLength/2,-carWidth/2,carLength,carWidth,5);
  ctx.fill();
  ctx.fillStyle="#c00001";
  roundRect(-8,-8,17,16,4);
  ctx.fill();
  ctx.fillStyle="#111";
  ctx.fillRect(-12,-13,6,3);
  ctx.fillRect(6,-13,6,3);
  ctx.fillRect(-12,10,6,3);
  ctx.fillRect(6,10,6,3);
  ctx.fillStyle="#fff";
  ctx.fillRect(11,-7,4,4);
  ctx.fillRect(11,3,4,4);

  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function spawnParticles(x,y,type="good"){
  const count=type==="perfect"?26:15;
  const power=type==="perfect"?170:120;
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*power,
      vy:(Math.random()-.5)*power,
      life:(type==="perfect"?.5:.35)+Math.random()*.25,
      max:.75,
      type
    });
  }
}

function updateParticles(dt){
  particles=particles.filter(p=>{
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.life-=dt;
    return p.life>0;
  });
}

function drawParticles(){
  ctx.save();
  for(const p of particles){
    const s=worldToScreen(p.x,p.y);
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.type==="perfect"?"#ffd35f":"#ffffff";
    ctx.beginPath();
    ctx.arc(s.x,s.y,(p.type==="perfect"?3.1:2.3)*dpr,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function updateTexts(){
  scoreText.textContent=score.toLocaleString();
  bestText.textContent=best.toLocaleString();
}

tapZone.addEventListener("pointerdown",e=>{e.preventDefault();press()});
window.addEventListener("pointerup",e=>{e.preventDefault();release()});
window.addEventListener("pointercancel",e=>{e.preventDefault();release()});

function handleKey(e){
  const isSpace=e.code==="Space"||e.key===" "||e.key==="Spacebar";
  if(!isSpace)return;
  e.preventDefault();
  e.stopPropagation();
  if(e.type==="keydown"){
    if(spacePressed)return;
    spacePressed=true;
    press();
  }else{
    release();
  }
}
window.addEventListener("keydown",handleKey,{capture:true});
window.addEventListener("keyup",handleKey,{capture:true});
document.addEventListener("keydown",handleKey,{capture:true});
document.addEventListener("keyup",handleKey,{capture:true});

startBtn.addEventListener("click",startGame);
retryBtn.addEventListener("click",startGame);
homeBtn.addEventListener("click",()=>{
  resultOverlay.classList.add("hidden");
  startOverlay.classList.remove("hidden");
  resetGame();
});
document.addEventListener("visibilitychange",()=>{if(document.hidden&&running)crash("게임이 일시정지되었습니다.")});

resetGame();
</script>
</body>
</html>
