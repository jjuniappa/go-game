<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Beat Tap" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>Beat Tap</title>

  <style>
    :root {
      --bg: #080808;
      --panel: #111;
      --line: #2b2b2b;
      --text: #f7f7f7;
      --muted: #aaa;
      --accent: #c00001;
      --blue: #5f8cff;
      --purple: #b46cff;
      --yellow: #ffd35f;
      --green: #5fffa8;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: max(12px, env(safe-area-inset-top)) 14px 9px;
      background: #111;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      z-index: 5;
    }

    .title h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.05em;
    }

    .title p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52vw;
    }

    .score-box {
      text-align: right;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 900;
    }

    .score-box span {
      color: var(--muted);
      font-weight: 700;
    }

    .setup, .result {
      position: fixed;
      inset: 0;
      z-index: 20;
      background:
        radial-gradient(circle at top, rgba(192,0,1,.28), transparent 34%),
        linear-gradient(180deg, #181818, #050505);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .result {
      display: none;
      z-index: 25;
    }

    .card {
      width: min(440px, 100%);
      background: rgba(18,18,18,.95);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 22px 80px rgba(0,0,0,.55);
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: -0.07em;
    }

    .card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 7px;
      margin: 14px 0;
    }

    .field label {
      font-size: 13px;
      color: #ddd;
      font-weight: 850;
    }

    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.13);
      background: #262626;
      color: #fff;
      border-radius: 15px;
      padding: 12px;
      font-size: 14px;
      font-weight: 800;
    }

    button {
      border: 0;
      cursor: pointer;
      color: #fff;
      font-weight: 950;
      touch-action: manipulation;
    }

    .start-btn, .sub-btn {
      width: 100%;
      border-radius: 16px;
      padding: 14px 12px;
      background: var(--accent);
      font-size: 16px;
      margin-top: 10px;
    }

    .sub-btn {
      background: #2d2d2d;
      font-size: 14px;
      padding: 12px;
    }

    .note-text {
      margin-top: 12px;
      color: #999;
      font-size: 12px;
      line-height: 1.5;
    }

    .game {
      position: relative;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      background:
        radial-gradient(circle at 50% 0%, rgba(192,0,1,.16), transparent 32%),
        #070707;
    }

    .lanes {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-left: 1px solid rgba(255,255,255,.07);
      border-right: 1px solid rgba(255,255,255,.07);
      overflow: hidden;
    }

    .lane {
      position: relative;
      border-right: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.008));
    }

    .lane:nth-child(1) { box-shadow: inset 0 -90px 90px rgba(95,140,255,.07); }
    .lane:nth-child(2) { box-shadow: inset 0 -90px 90px rgba(180,108,255,.07); }
    .lane:nth-child(3) { box-shadow: inset 0 -90px 90px rgba(255,211,95,.07); }
    .lane:nth-child(4) { box-shadow: inset 0 -90px 90px rgba(95,255,168,.07); }

    .lane:last-child {
      border-right: 0;
    }

    .judgement-line {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 82px;
      height: 3px;
      background: var(--accent);
      box-shadow: 0 0 20px rgba(192,0,1,.95);
      z-index: 3;
    }

    .note {
      position: absolute;
      width: 76%;
      height: 23px;
      left: 12%;
      top: -40px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff, #c8c8c8);
      box-shadow: 0 0 18px rgba(255,255,255,.48);
      z-index: 2;
    }

    .note.l0 { border: 2px solid var(--blue); }
    .note.l1 { border: 2px solid var(--purple); }
    .note.l2 { border: 2px solid var(--yellow); }
    .note.l3 { border: 2px solid var(--green); }

    .hit-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px 10px max(12px, env(safe-area-inset-bottom));
      background: #111;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .hit-btn {
      height: 66px;
      border-radius: 18px;
      background: #242424;
      border: 1px solid rgba(255,255,255,.12);
      font-size: 18px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.24);
    }

    .hit-btn:active, .hit-btn.active {
      transform: translateY(2px);
      filter: brightness(1.35);
    }

    .hit-btn:nth-child(1) { color: var(--blue); }
    .hit-btn:nth-child(2) { color: var(--purple); }
    .hit-btn:nth-child(3) { color: var(--yellow); }
    .hit-btn:nth-child(4) { color: var(--green); }

    .judge {
      position: absolute;
      left: 50%;
      top: 44%;
      transform: translate(-50%, -50%);
      font-size: 34px;
      font-weight: 1000;
      letter-spacing: -0.05em;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 4px 18px rgba(0,0,0,.75);
    }

    .judge.show {
      animation: judgePop .45s ease;
    }

    @keyframes judgePop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.75); }
      25% { opacity: 1; transform: translate(-50%, -60%) scale(1.08); }
      100% { opacity: 0; transform: translate(-50%, -82%) scale(1); }
    }

    .combo {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 900;
      opacity: .9;
      pointer-events: none;
      z-index: 9;
    }

    .progress {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      background: rgba(255,255,255,.09);
      z-index: 6;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(192,0,1,.8);
    }

    .pause-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.12);
      z-index: 7;
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0;
    }

    .stat {
      background: #222;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 15px;
      padding: 12px;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 20px;
    }

    audio {
      display: none;
    }

    @media (min-width: 900px) {
      body {
        max-width: 520px;
        margin: 0 auto;
        border-left: 1px solid rgba(255,255,255,.08);
        border-right: 1px solid rgba(255,255,255,.08);
      }
    }

    @media (max-height: 720px) {
      .title p { display: none; }
      .topbar { padding-top: 9px; padding-bottom: 7px; }
      .hit-btn { height: 56px; }
      .judgement-line { bottom: 72px; }
    }
  </style>
</head>
<body>
  <audio id="music" src="./assets/beat_loop.wav" preload="auto" loop></audio>

  <header class="topbar">
    <div class="title">
      <h1>Beat Tap</h1>
      <p>내장 음악으로 플레이하는 리듬게임</p>
    </div>
    <div class="score-box">
      <div><span>SCORE</span> <b id="scoreText">0</b></div>
      <div><span>COMBO</span> <b id="comboText">0</b></div>
    </div>
  </header>

  <main class="game">
    <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
    <button id="pauseBtn" class="pause-btn">Ⅱ</button>

    <div id="lanes" class="lanes">
      <div class="lane" data-lane="0"></div>
      <div class="lane" data-lane="1"></div>
      <div class="lane" data-lane="2"></div>
      <div class="lane" data-lane="3"></div>
      <div class="judgement-line"></div>
      <div id="judgeText" class="judge">PERFECT</div>
      <div id="comboCenter" class="combo"></div>
    </div>

    <section class="hit-buttons">
      <button class="hit-btn" data-lane="0">D</button>
      <button class="hit-btn" data-lane="1">F</button>
      <button class="hit-btn" data-lane="2">J</button>
      <button class="hit-btn" data-lane="3">K</button>
    </section>
  </main>

  <section id="setup" class="setup">
    <div class="card">
      <h2>Beat Tap</h2>
      <p>음악 파일 없이 바로 실행됩니다. 내장된 비트 음악에 맞춰 4개 라인을 터치하세요.</p>

      <div class="field">
        <label for="difficulty">난이도</label>
        <select id="difficulty">
          <option value="easy">Easy · 느림</option>
          <option value="normal" selected>Normal · 기본</option>
          <option value="hard">Hard · 빠름</option>
        </select>
      </div>

      <button id="startBtn" class="start-btn">게임 시작</button>
      <button id="testMusicBtn" class="sub-btn">음악 미리듣기</button>

      <div class="note-text">
        ※ iPhone/Android 정책상 음악은 반드시 사용자가 버튼을 한 번 눌러야 재생됩니다.<br>
        ※ GitHub Pages에 올리면 홈 화면에 추가해서 앱처럼 실행할 수 있습니다.
      </div>
    </div>
  </section>

  <section id="result" class="result">
    <div class="card">
      <h2>RESULT</h2>
      <p>플레이 결과입니다.</p>

      <div class="stats">
        <div class="stat"><small>Score</small><strong id="resultScore">0</strong></div>
        <div class="stat"><small>Max Combo</small><strong id="resultCombo">0</strong></div>
        <div class="stat"><small>Perfect</small><strong id="resultPerfect">0</strong></div>
        <div class="stat"><small>Good / Miss</small><strong id="resultGoodMiss">0 / 0</strong></div>
      </div>

      <button id="againBtn" class="start-btn">다시 하기</button>
    </div>
  </section>

  <script>
    const music = document.getElementById("music");
    const setup = document.getElementById("setup");
    const resultPanel = document.getElementById("result");
    const startBtn = document.getElementById("startBtn");
    const testMusicBtn = document.getElementById("testMusicBtn");
    const againBtn = document.getElementById("againBtn");
    const difficultyEl = document.getElementById("difficulty");
    const lanesEl = document.getElementById("lanes");
    const judgeText = document.getElementById("judgeText");
    const comboCenter = document.getElementById("comboCenter");
    const scoreText = document.getElementById("scoreText");
    const comboText = document.getElementById("comboText");
    const progressBar = document.getElementById("progressBar");
    const pauseBtn = document.getElementById("pauseBtn");

    const resultScore = document.getElementById("resultScore");
    const resultCombo = document.getElementById("resultCombo");
    const resultPerfect = document.getElementById("resultPerfect");
    const resultGoodMiss = document.getElementById("resultGoodMiss");

    const hitButtons = [...document.querySelectorAll(".hit-btn")];

    let notes = [];
    let activeNotes = [];
    let animationId = null;
    let startTime = 0;
    let paused = false;
    let gameRunning = false;
    let score = 0;
    let combo = 0;
    let maxCombo = 0;
    let perfect = 0;
    let good = 0;
    let miss = 0;
    let chartDuration = 32;
    let noteSpeed = 380;
    let approachTime = 1.6;
    let nextNoteIndex = 0;

    const judgementOffset = 82;

    const charts = {
      easy: {
        speed: 310,
        approach: 1.9,
        pattern: [
          [1,0],[2,1],[3,2],[4,3],
          [5,0],[6,2],[7,1],[8,3],
          [9,0],[9.5,1],[10,2],[10.5,3],
          [12,3],[13,2],[14,1],[15,0],
          [17,0],[18,1],[19,2],[20,3],
          [22,0],[22.5,2],[23,1],[23.5,3],
          [25,3],[26,2],[27,1],[28,0],
          [29,0],[29.5,1],[30,2],[30.5,3]
        ]
      },
      normal: {
        speed: 390,
        approach: 1.55,
        pattern: [
          [1,0],[1.5,1],[2,2],[2.5,3],
          [3,1],[3.5,2],[4,0],[4.5,3],
          [5,0],[5.25,1],[5.5,2],[5.75,3],
          [6.5,3],[7,1],[7.5,2],[8,0],
          [9,0],[9.5,2],[10,1],[10.5,3],
          [11,0],[11.25,1],[11.5,2],[11.75,3],
          [13,3],[13.5,2],[14,1],[14.5,0],
          [15,0],[15.25,2],[15.5,1],[15.75,3],
          [17,0],[17.5,1],[18,2],[18.5,3],
          [19,3],[19.25,2],[19.5,1],[19.75,0],
          [21,0],[21.5,2],[22,1],[22.5,3],
          [23,0],[23.25,1],[23.5,2],[23.75,3],
          [25,3],[25.5,2],[26,1],[26.5,0],
          [27,0],[27.25,2],[27.5,1],[27.75,3],
          [29,0],[29.5,1],[30,2],[30.5,3]
        ]
      },
      hard: {
        speed: 470,
        approach: 1.25,
        pattern: [
          [1,0],[1.25,1],[1.5,2],[1.75,3],
          [2,3],[2.25,2],[2.5,1],[2.75,0],
          [3.25,0],[3.5,2],[3.75,1],[4,3],
          [4.5,0],[4.75,1],[5,2],[5.25,3],
          [6,0],[6,3],[6.5,1],[6.5,2],
          [7,0],[7.25,1],[7.5,2],[7.75,3],
          [8.25,3],[8.5,1],[8.75,2],[9,0],
          [9.5,0],[9.75,2],[10,1],[10.25,3],
          [11,0],[11,3],[11.5,1],[11.5,2],
          [12,0],[12.25,1],[12.5,2],[12.75,3],
          [13.25,3],[13.5,2],[13.75,1],[14,0],
          [15,0],[15.25,2],[15.5,1],[15.75,3],
          [16.5,0],[16.5,3],[17,1],[17,2],
          [18,0],[18.25,1],[18.5,2],[18.75,3],
          [19.25,3],[19.5,2],[19.75,1],[20,0],
          [21,0],[21.25,2],[21.5,1],[21.75,3],
          [22.5,0],[22.5,3],[23,1],[23,2],
          [24,0],[24.25,1],[24.5,2],[24.75,3],
          [25.25,3],[25.5,2],[25.75,1],[26,0],
          [27,0],[27.25,2],[27.5,1],[27.75,3],
          [28.5,0],[28.5,3],[29,1],[29,2],
          [30,0],[30.25,1],[30.5,2],[30.75,3]
        ]
      }
    };

    function initChart() {
      const cfg = charts[difficultyEl.value];
      noteSpeed = cfg.speed;
      approachTime = cfg.approach;
      notes = cfg.pattern.map((n, i) => ({
        id: i,
        time: n[0],
        lane: n[1],
        hit: false,
        missed: false,
        el: null
      }));
      chartDuration = 32;
      nextNoteIndex = 0;
      activeNotes = [];
    }

    async function startGame() {
      initChart();
      clearNotes();

      score = 0;
      combo = 0;
      maxCombo = 0;
      perfect = 0;
      good = 0;
      miss = 0;
      gameRunning = true;
      paused = false;

      updateScore();
      setup.style.display = "none";
      resultPanel.style.display = "none";

      music.pause();
      music.currentTime = 0;
      music.loop = false;

      try {
        await music.play();
      } catch (e) {
        showJudge("TAP AGAIN");
        setup.style.display = "flex";
        return;
      }

      startTime = performance.now() / 1000 - music.currentTime;
      cancelAnimationFrame(animationId);
      loop();
    }

    function loop() {
      if (!gameRunning || paused) return;

      const now = music.currentTime;

      while (nextNoteIndex < notes.length && notes[nextNoteIndex].time - approachTime <= now) {
        spawnNote(notes[nextNoteIndex]);
        nextNoteIndex++;
      }

      const lanesHeight = lanesEl.clientHeight;
      const judgeY = lanesHeight - judgementOffset;

      for (const note of activeNotes) {
        if (!note.el) continue;
        const delta = note.time - now;
        const y = judgeY - delta * noteSpeed;
        note.el.style.transform = `translateY(${y}px)`;

        if (!note.hit && !note.missed && now - note.time > 0.18) {
          note.missed = true;
          note.el.remove();
          note.el = null;
          miss++;
          combo = 0;
          showJudge("MISS");
          updateScore();
        }
      }

      activeNotes = activeNotes.filter(n => n.el && !n.hit && !n.missed);

      progressBar.style.width = `${Math.min(100, (now / chartDuration) * 100)}%`;

      if (now >= chartDuration || (nextNoteIndex >= notes.length && activeNotes.length === 0)) {
        endGame();
        return;
      }

      animationId = requestAnimationFrame(loop);
    }

    function spawnNote(note) {
      const laneEl = document.querySelector(`.lane[data-lane="${note.lane}"]`);
      const el = document.createElement("div");
      el.className = `note l${note.lane}`;
      laneEl.appendChild(el);
      note.el = el;
      activeNotes.push(note);
    }

    function hitLane(lane) {
      if (!gameRunning || paused) return;

      flashButton(lane);

      const now = music.currentTime;
      const laneNotes = activeNotes
        .filter(n => n.lane === lane && !n.hit && !n.missed)
        .sort((a, b) => Math.abs(a.time - now) - Math.abs(b.time - now));

      if (laneNotes.length === 0) {
        combo = 0;
        miss++;
        showJudge("MISS");
        updateScore();
        return;
      }

      const note = laneNotes[0];
      const diff = Math.abs(note.time - now);

      if (diff <= 0.07) {
        note.hit = true;
        if (note.el) note.el.remove();
        score += 1000 + combo * 8;
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        perfect++;
        showJudge("PERFECT");
      } else if (diff <= 0.14) {
        note.hit = true;
        if (note.el) note.el.remove();
        score += 520 + combo * 4;
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        good++;
        showJudge("GOOD");
      } else {
        combo = 0;
        miss++;
        showJudge("MISS");
      }

      updateScore();
    }

    function flashButton(lane) {
      const btn = document.querySelector(`.hit-btn[data-lane="${lane}"]`);
      btn.classList.add("active");
      setTimeout(() => btn.classList.remove("active"), 90);
    }

    function showJudge(text) {
      judgeText.textContent = text;
      judgeText.classList.remove("show");
      void judgeText.offsetWidth;
      judgeText.classList.add("show");
      comboCenter.textContent = combo > 1 ? `${combo} COMBO` : "";
    }

    function updateScore() {
      scoreText.textContent = score.toLocaleString();
      comboText.textContent = combo;
    }

    function clearNotes() {
      document.querySelectorAll(".note").forEach(el => el.remove());
    }

    function endGame() {
      gameRunning = false;
      paused = false;
      music.pause();
      cancelAnimationFrame(animationId);
      clearNotes();

      resultScore.textContent = score.toLocaleString();
      resultCombo.textContent = maxCombo;
      resultPerfect.textContent = perfect;
      resultGoodMiss.textContent = `${good} / ${miss}`;
      resultPanel.style.display = "flex";
    }

    function togglePause() {
      if (!gameRunning) return;

      if (!paused) {
        paused = true;
        music.pause();
        pauseBtn.textContent = "▶";
        cancelAnimationFrame(animationId);
      } else {
        paused = false;
        music.play();
        pauseBtn.textContent = "Ⅱ";
        loop();
      }
    }

    async function testMusic() {
      try {
        if (music.paused) {
          music.loop = true;
          await music.play();
          testMusicBtn.textContent = "미리듣기 정지";
        } else {
          music.pause();
          music.currentTime = 0;
          testMusicBtn.textContent = "음악 미리듣기";
        }
      } catch (e) {
        alert("브라우저가 음악 재생을 막았습니다. 다시 한 번 버튼을 눌러주세요.");
      }
    }

    startBtn.addEventListener("click", startGame);
    againBtn.addEventListener("click", () => {
      resultPanel.style.display = "none";
      setup.style.display = "flex";
      progressBar.style.width = "0%";
    });
    testMusicBtn.addEventListener("click", testMusic);
    pauseBtn.addEventListener("click", togglePause);

    hitButtons.forEach(btn => {
      btn.addEventListener("pointerdown", e => {
        e.preventDefault();
        hitLane(Number(btn.dataset.lane));
      });
    });

    window.addEventListener("keydown", e => {
      const map = { d: 0, f: 1, j: 2, k: 3 };
      const lane = map[e.key.toLowerCase()];
      if (lane !== undefined) hitLane(lane);
      if (e.key === " ") togglePause();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && gameRunning && !paused) {
        togglePause();
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
