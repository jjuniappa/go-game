<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI 오목 게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f3e8 0%, #ede0c5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 18px;
      color: #22170f;
      overflow-x: hidden;
    }
    .app {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .top {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
    }
    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(34, 23, 15, 0.1);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    #status {
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.64);
      box-shadow: 0 6px 18px rgba(50, 30, 10, 0.08);
      font-size: 17px;
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #boardWrap {
      width: min(94vw, 620px);
      height: min(94vw, 620px);
      background: #d6a85f;
      border: 5px solid #5f3817;
      border-radius: 16px;
      position: relative;
      box-shadow: 0 16px 35px rgba(60, 35, 10, 0.28), inset 0 0 20px rgba(255,255,255,0.18);
      touch-action: none;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .controls {
      width: 100%;
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 800;
      border: none;
      border-radius: 12px;
      background: #22170f;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(50, 30, 10, 0.18);
    }
    button.secondary {
      background: rgba(34, 23, 15, 0.12);
      color: #22170f;
      box-shadow: none;
    }
    button:active { transform: translateY(1px); }
    .info {
      width: 100%;
      margin-top: 2px;
      font-size: 13px;
      color: #6b513c;
      text-align: center;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top">
      <h1>AI 오목</h1>
      <div class="badge">10×10 HARD</div>
    </div>

    <div id="status">당신 차례입니다. 흑돌을 놓으세요.</div>

    <div id="boardWrap">
      <canvas id="board"></canvas>
    </div>

    <div class="controls">
      <button onclick="resetGame()">다시 시작</button>
      <button class="secondary" onclick="toggleFirstTurn()">선공 변경</button>
    </div>

    <div class="info">
      사용자는 흑돌, AI는 백돌입니다. 선과 선이 만나는 교차점에 돌을 놓습니다.<br />
      AI는 공격/방어 점수 계산으로 다음 수를 선택합니다.
    </div>
  </main>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status');

    const SIZE = 10;
    const EMPTY = 0;
    const PLAYER = 1;
    const AI = 2;
    const WIN_COUNT = 5;

    const directions = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    let board = [];
    let cell = 0;
    let padding = 0;
    let gameOver = false;
    let currentTurn = PLAYER;
    let playerFirst = true;
    let lastMove = null;

    function initCanvas() {
      const wrap = document.getElementById('boardWrap');
      const rect = wrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      padding = rect.width * 0.09;
      cell = (rect.width - padding * 2) / (SIZE - 1);
      drawBoard();
    }

    function resetGame() {
      board = Array.from({ length: SIZE }, () => Array(SIZE).fill(EMPTY));
      gameOver = false;
      currentTurn = playerFirst ? PLAYER : AI;
      lastMove = null;
      drawBoard();

      if (currentTurn === PLAYER) {
        statusText.textContent = '당신 차례입니다. 흑돌을 놓으세요.';
      } else {
        statusText.textContent = 'AI가 먼저 둡니다...';
        setTimeout(aiMove, 350);
      }
    }

    function toggleFirstTurn() {
      playerFirst = !playerFirst;
      resetGame();
    }

    function drawBoard() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#e5bd78');
      bg.addColorStop(1, '#bf823a');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      drawWoodTexture(w, h);

      ctx.strokeStyle = '#3a240f';
      ctx.lineWidth = 1.35;

      for (let i = 0; i < SIZE; i++) {
        const pos = padding + i * cell;
        ctx.beginPath();
        ctx.moveTo(padding, pos);
        ctx.lineTo(w - padding, pos);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pos, padding);
        ctx.lineTo(pos, h - padding);
        ctx.stroke();
      }

      drawStarPoints();

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (board[y][x] !== EMPTY) drawStone(x, y, board[y][x]);
        }
      }

      if (lastMove) drawLastMoveMark(lastMove.x, lastMove.y);
    }

    function drawWoodTexture(w, h) {
      ctx.globalAlpha = 0.1;
      ctx.strokeStyle = '#5c3514';
      for (let i = 0; i < 18; i++) {
        const y = (i / 18) * h + Math.sin(i) * 8;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.bezierCurveTo(w * 0.3, y + 10, w * 0.65, y - 12, w, y + 6);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function drawStarPoints() {
      const points = [[2,2], [7,2], [2,7], [7,7], [4,4], [5,5]];
      ctx.fillStyle = '#3a240f';
      points.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(padding + x * cell, padding + y * cell, Math.max(3, cell * 0.07), 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawStone(x, y, type) {
      const cx = padding + x * cell;
      const cy = padding + y * cell;
      const radius = cell * 0.38;

      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = 5;
      ctx.shadowOffsetY = 3;

      const gradient = ctx.createRadialGradient(cx - radius * 0.35, cy - radius * 0.35, radius * 0.1, cx, cy, radius);
      if (type === PLAYER) {
        gradient.addColorStop(0, '#5e5e5e');
        gradient.addColorStop(0.45, '#1f1f1f');
        gradient.addColorStop(1, '#000000');
      } else {
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.55, '#f4f4f4');
        gradient.addColorStop(1, '#bfbfbf');
      }

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = type === PLAYER ? '#050505' : '#a8a8a8';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function drawLastMoveMark(x, y) {
      const cx = padding + x * cell;
      const cy = padding + y * cell;
      ctx.beginPath();
      ctx.arc(cx, cy, cell * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = board[y][x] === PLAYER ? '#ffffff' : '#111111';
      ctx.fill();
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      let clientX;
      let clientY;

      if (event.touches && event.touches.length > 0) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else if (event.changedTouches && event.changedTouches.length > 0) {
        clientX = event.changedTouches[0].clientX;
        clientY = event.changedTouches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function handleInput(event) {
      event.preventDefault();
      if (gameOver || currentTurn !== PLAYER) return;

      const pos = getPointerPosition(event);
      const x = Math.round((pos.x - padding) / cell);
      const y = Math.round((pos.y - padding) / cell);

      if (!isInside(x, y)) return;

      const intersectionX = padding + x * cell;
      const intersectionY = padding + y * cell;
      const distance = Math.hypot(pos.x - intersectionX, pos.y - intersectionY);
      if (distance > cell * 0.48) return;
      if (board[y][x] !== EMPTY) return;

      placeStone(x, y, PLAYER);

      if (finishCheck(x, y, PLAYER, '당신이 이겼습니다.')) return;
      currentTurn = AI;
      statusText.textContent = 'AI가 생각 중입니다...';
      setTimeout(aiMove, 280);
    }

    function placeStone(x, y, type) {
      board[y][x] = type;
      lastMove = { x, y };
      drawBoard();
    }

    function aiMove() {
      if (gameOver) return;
      const move = getBestMove();
      if (!move) {
        statusText.textContent = '무승부입니다.';
        gameOver = true;
        return;
      }

      placeStone(move.x, move.y, AI);
      if (finishCheck(move.x, move.y, AI, 'AI가 이겼습니다.')) return;

      currentTurn = PLAYER;
      statusText.textContent = '당신 차례입니다. 흑돌을 놓으세요.';
    }

    function finishCheck(x, y, type, message) {
      if (checkWin(x, y, type)) {
        statusText.textContent = message;
        gameOver = true;
        drawWinningLine(x, y, type);
        return true;
      }
      if (isBoardFull()) {
        statusText.textContent = '무승부입니다.';
        gameOver = true;
        return true;
      }
      return false;
    }

    function drawWinningLine(x, y, type) {
      for (const [dx, dy] of directions) {
        const stones = collectLineStones(x, y, dx, dy, type);
        if (stones.length >= WIN_COUNT) {
          const first = stones[0];
          const last = stones[stones.length - 1];
          ctx.beginPath();
          ctx.moveTo(padding + first.x * cell, padding + first.y * cell);
          ctx.lineTo(padding + last.x * cell, padding + last.y * cell);
          ctx.strokeStyle = '#d32020';
          ctx.lineWidth = 5;
          ctx.lineCap = 'round';
          ctx.stroke();
          return;
        }
      }
    }

    function collectLineStones(x, y, dx, dy, type) {
      const stones = [{ x, y }];
      let nx = x + dx;
      let ny = y + dy;
      while (isInside(nx, ny) && board[ny][nx] === type) {
        stones.push({ x: nx, y: ny });
        nx += dx;
        ny += dy;
      }
      nx = x - dx;
      ny = y - dy;
      while (isInside(nx, ny) && board[ny][nx] === type) {
        stones.unshift({ x: nx, y: ny });
        nx -= dx;
        ny -= dy;
      }
      return stones;
    }

    function checkWin(x, y, type) {
      return directions.some(([dx, dy]) => countConnected(x, y, dx, dy, type) >= WIN_COUNT);
    }

    function countConnected(x, y, dx, dy, type) {
      let count = 1;
      count += countDirection(x, y, dx, dy, type);
      count += countDirection(x, y, -dx, -dy, type);
      return count;
    }

    function countDirection(x, y, dx, dy, type) {
      let count = 0;
      let nx = x + dx;
      let ny = y + dy;
      while (isInside(nx, ny) && board[ny][nx] === type) {
        count++;
        nx += dx;
        ny += dy;
      }
      return count;
    }

    function getBestMove() {
      const candidates = getCandidateMoves();
      if (candidates.length === 0) return { x: Math.floor(SIZE / 2), y: Math.floor(SIZE / 2) };

      let best = null;
      let bestScore = -Infinity;

      for (const move of candidates) {
        const { x, y } = move;

        board[y][x] = AI;
        if (checkWin(x, y, AI)) {
          board[y][x] = EMPTY;
          return { x, y };
        }
        board[y][x] = EMPTY;

        board[y][x] = PLAYER;
        if (checkWin(x, y, PLAYER)) {
          board[y][x] = EMPTY;
          return { x, y };
        }
        board[y][x] = EMPTY;
      }

      for (const move of candidates) {
        const { x, y } = move;
        const attackScore = evaluateMove(x, y, AI);
        const defenseScore = evaluateMove(x, y, PLAYER) * 1.18;
        const centerScore = getCenterScore(x, y);
        const neighborScore = getNeighborScore(x, y);
        const randomTiny = Math.random() * 3;
        const total = attackScore + defenseScore + centerScore + neighborScore + randomTiny;

        if (total > bestScore) {
          bestScore = total;
          best = { x, y };
        }
      }

      return best;
    }

    function getCandidateMoves() {
      const set = new Set();
      let hasStone = false;

      for (let y = 0; y < SIZE; y++) {
        for (let x = 0; x < SIZE; x++) {
          if (board[y][x] !== EMPTY) {
            hasStone = true;
            for (let dy = -2; dy <= 2; dy++) {
              for (let dx = -2; dx <= 2; dx++) {
                const nx = x + dx;
                const ny = y + dy;
                if (isInside(nx, ny) && board[ny][nx] === EMPTY) {
                  set.add(nx + ',' + ny);
                }
              }
            }
          }
        }
      }

      if (!hasStone) {
        return [
          { x: 4, y: 4 },
          { x: 5, y: 5 },
          { x: 4, y: 5 },
          { x: 5, y: 4 }
        ];
      }

      return Array.from(set).map(key => {
        const [x, y] = key.split(',').map(Number);
        return { x, y };
      });
    }

    function evaluateMove(x, y, type) {
      let score = 0;
      board[y][x] = type;

      for (const [dx, dy] of directions) {
        const line = analyzeLine(x, y, dx, dy, type);
        score += patternScore(line.count, line.openEnds, line.gaps);
      }

      board[y][x] = EMPTY;
      return score;
    }

    function analyzeLine(x, y, dx, dy, type) {
      let count = 1;
      let openEnds = 0;
      let gaps = 0;

      let nx = x + dx;
      let ny = y + dy;
      let skipped = false;
      while (isInside(nx, ny)) {
        if (board[ny][nx] === type) {
          count++;
        } else if (board[ny][nx] === EMPTY && !skipped) {
          const tx = nx + dx;
          const ty = ny + dy;
          if (isInside(tx, ty) && board[ty][tx] === type) {
            gaps++;
            skipped = true;
          } else {
            openEnds++;
            break;
          }
        } else {
          break;
        }
        nx += dx;
        ny += dy;
      }

      nx = x - dx;
      ny = y - dy;
      skipped = false;
      while (isInside(nx, ny)) {
        if (board[ny][nx] === type) {
          count++;
        } else if (board[ny][nx] === EMPTY && !skipped) {
          const tx = nx - dx;
          const ty = ny - dy;
          if (isInside(tx, ty) && board[ty][tx] === type) {
            gaps++;
            skipped = true;
          } else {
            openEnds++;
            break;
          }
        } else {
          break;
        }
        nx -= dx;
        ny -= dy;
      }

      return { count, openEnds, gaps };
    }

    function patternScore(count, openEnds, gaps) {
      if (count >= 5) return 1000000;
      if (count === 4 && openEnds >= 1) return 120000;
      if (count === 4 && gaps >= 1) return 90000;
      if (count === 3 && openEnds === 2) return 35000;
      if (count === 3 && openEnds === 1) return 9000;
      if (count === 3 && gaps >= 1) return 8000;
      if (count === 2 && openEnds === 2) return 2600;
      if (count === 2 && openEnds === 1) return 600;
      if (count === 1 && openEnds === 2) return 80;
      return 10;
    }

    function getCenterScore(x, y) {
      const center = (SIZE - 1) / 2;
      const dist = Math.hypot(x - center, y - center);
      return Math.max(0, 70 - dist * 12);
    }

    function getNeighborScore(x, y) {
      let score = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx;
          const ny = y + dy;
          if (!isInside(nx, ny)) continue;
          if (board[ny][nx] === AI) score += 25;
          if (board[ny][nx] === PLAYER) score += 18;
        }
      }
      return score;
    }

    function isInside(x, y) {
      return x >= 0 && x < SIZE && y >= 0 && y < SIZE;
    }

    function isBoardFull() {
      return board.every(row => row.every(cell => cell !== EMPTY));
    }

    canvas.addEventListener('click', handleInput);
    canvas.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('resize', initCanvas);

    resetGame();
    initCanvas();
  </script>
</body>
</html>
