<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>칼퇴런</title>
<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#101010"/>
<style>
:root{
  --bg:#0b0b0c;
  --panel:#181818;
  --accent:#c00001;
  --text:#f5f5f5;
  --muted:#9ca3af;
  --good:#ffd35f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{touch-action:none;user-select:none}
.topbar{
  position:fixed;z-index:20;top:0;left:0;right:0;height:72px;
  padding:12px 14px 8px;
  display:flex;justify-content:space-between;align-items:flex-start;
  background:linear-gradient(180deg,rgba(11,11,12,.96),rgba(11,11,12,0))
}
.title h1{margin:0;font-size:20px;letter-spacing:-.06em}
.title p{margin:2px 0 0;color:var(--muted);font-size:11px}
.scorebox{text-align:right;font-weight:900}
.scorebox div{font-size:12px;color:#ddd;line-height:1.35}
.scorebox span{font-size:10px;color:#888;margin-right:3px}
.game{position:fixed;inset:0}
.canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at 50% 26%,#1b1b1d 0%,#09090a 56%,#040404 100%)}
.touch-left,.touch-right{position:absolute;top:0;bottom:0;width:50%;z-index:10}
.touch-left{left:0}.touch-right{right:0}
.judge{
  position:absolute;z-index:18;left:50%;top:25%;
  transform:translate(-50%,-50%) scale(.9);
  font-size:34px;font-weight:1000;letter-spacing:-.06em;color:#fff;
  text-shadow:0 0 18px rgba(192,0,1,.8);
  opacity:0;pointer-events:none
}
.judge.show{animation:judge .55s ease}
@keyframes judge{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.78)}
  18%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
  72%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-80%) scale(.95)}
}
.overlay{
  position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.72);
  display:flex;align-items:center;justify-content:center;padding:22px
}
.overlay.hidden{display:none}
.card{
  width:min(440px,100%);
  background:rgba(18,18,18,.97);
  border:1px solid rgba(255,255,255,.1);
  border-radius:26px;
  padding:22px;
  box-shadow:0 22px 80px rgba(0,0,0,.55)
}
.card h2{margin:0 0 6px;font-size:34px;letter-spacing:-.09em}
.card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.btn{
  width:100%;border:0;border-radius:16px;padding:14px 12px;
  background:var(--accent);color:#fff;font-weight:950;font-size:16px;
  margin-top:10px;cursor:pointer
}
.sub-btn{background:#2d2d2d;font-size:14px;padding:12px}
.howto{margin-top:12px;color:#999;font-size:12px;line-height:1.65}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.item-card{background:#222;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:10px;font-size:12px;color:#d1d5db}
.item-card b{display:block;color:#fff;margin-bottom:3px;font-size:13px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.stat{background:#222;border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:12px}
.stat small{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
.stat strong{font-size:21px}
.flash{position:absolute;inset:0;background:rgba(192,0,1,.25);opacity:0;pointer-events:none;z-index:19}
.flash.show{animation:damage .32s ease}
@keyframes damage{0%,100%{opacity:0}40%{opacity:1}}
.status{
  position:absolute;z-index:17;left:50%;bottom:86px;transform:translateX(-50%);
  display:flex;gap:6px;pointer-events:none
}
.badge{
  padding:7px 10px;border-radius:999px;background:rgba(255,211,95,.88);
  color:#111;font-size:12px;font-weight:1000;opacity:0;transition:.12s
}
.badge.show{opacity:1}
@media (min-width:900px){
  body{max-width:520px;margin:0 auto;border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}
}
</style>
</head>
<body tabindex="0">
<header class="topbar">
  <div class="title">
    <h1>칼퇴런</h1>
    <p>회의와 야근을 피해 퇴근하라</p>
  </div>
  <div class="scorebox">
    <div><span>SCORE</span> <b id="scoreText">0</b></div>
    <div><span>BEST</span> <b id="bestText">0</b></div>
    <div><span>퇴근까지</span> <b id="distanceText">1000m</b></div>
  </div>
</header>

<main id="game" class="game">
  <canvas id="canvas" class="canvas"></canvas>
  <div id="leftZone" class="touch-left"></div>
  <div id="rightZone" class="touch-right"></div>
  <div id="judge" class="judge">칼퇴!</div>
  <div id="flash" class="flash"></div>
  <div class="status">
    <div id="coffeeBadge" class="badge">커피 부스터</div>
    <div id="vacationBadge" class="badge">연차 무적</div>
  </div>
</main>

<section id="startOverlay" class="overlay">
  <div class="card">
    <h2>칼퇴런</h2>
    <p>회의, 결재, 상사, 야근폭탄을 피해 퇴근문까지 달리세요.</p>
    <div class="item-grid">
      <div class="item-card"><b>💰 월급봉투</b>점수 +100</div>
      <div class="item-card"><b>☕ 커피</b>잠깐 속도 증가</div>
      <div class="item-card"><b>🏖️ 연차카드</b>잠깐 무적</div>
      <div class="item-card"><b>💣 야근폭탄</b>즉시 게임오버</div>
    </div>
    <button id="startBtn" class="btn">출근... 아니 퇴근 시작</button>
    <div class="howto">
      모바일: 왼쪽/오른쪽 화면 터치 = 라인 이동<br>
      PC: ← / → 방향키 = 라인 이동<br>
      퇴근문까지 도착하면 보너스 점수를 받습니다.
    </div>
  </div>
</section>

<section id="resultOverlay" class="overlay hidden">
  <div class="card">
    <h2 id="resultTitle">퇴근 실패</h2>
    <p id="resultReason">야근에 붙잡혔습니다.</p>
    <div class="stats">
      <div class="stat"><small>Score</small><strong id="resultScore">0</strong></div>
      <div class="stat"><small>Best</small><strong id="resultBest">0</strong></div>
      <div class="stat"><small>Distance</small><strong id="resultDistance">0m</strong></div>
      <div class="stat"><small>Items</small><strong id="resultItems">0</strong></div>
    </div>
    <button id="retryBtn" class="btn">다시 도망가기</button>
    <button id="homeBtn" class="btn sub-btn">처음 화면</button>
  </div>
</section>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const leftZone=document.getElementById("leftZone");
const rightZone=document.getElementById("rightZone");
const startOverlay=document.getElementById("startOverlay");
const resultOverlay=document.getElementById("resultOverlay");
const startBtn=document.getElementById("startBtn");
const retryBtn=document.getElementById("retryBtn");
const homeBtn=document.getElementById("homeBtn");
const scoreText=document.getElementById("scoreText");
const bestText=document.getElementById("bestText");
const distanceText=document.getElementById("distanceText");
const resultTitle=document.getElementById("resultTitle");
const resultReason=document.getElementById("resultReason");
const resultScore=document.getElementById("resultScore");
const resultBest=document.getElementById("resultBest");
const resultDistance=document.getElementById("resultDistance");
const resultItems=document.getElementById("resultItems");
const judge=document.getElementById("judge");
const flash=document.getElementById("flash");
const coffeeBadge=document.getElementById("coffeeBadge");
const vacationBadge=document.getElementById("vacationBadge");

let W=0,H=0,dpr=1;
let running=false,raf=null,last=0;
let best=Number(localStorage.getItem("kaltoe-run-best")||0);

let player,objects,particles,score,distance,goalDistance,speed,spawnTimer,totalTime,itemsCollected,coffeeTime,vacationTime,shake;
let laneTarget=1;
const laneCount=3;

function resize(){
  dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  W=Math.floor(innerWidth*dpr);
  H=Math.floor(innerHeight*dpr);
  canvas.width=W;canvas.height=H;
}
addEventListener("resize",resize,{passive:true});
resize();

function laneX(lane){
  const roadW=Math.min(W*.82,430*dpr);
  const left=W/2-roadW/2;
  return left+roadW*(lane+.5)/laneCount;
}
function rand(a,b){return a+Math.random()*(b-a)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function resetGame(){
  goalDistance=1000;
  score=0;
  distance=0;
  speed=280*dpr;
  spawnTimer=0;
  totalTime=0;
  itemsCollected=0;
  coffeeTime=0;
  vacationTime=0;
  shake=0;
  objects=[];
  particles=[];
  laneTarget=1;
  player={
    lane:1,
    x:laneX(1),
    y:H*.76,
    w:34*dpr,
    h:46*dpr,
    anim:0
  };
  updateTexts();
  draw();
}

function startGame(){
  resetGame();
  document.body.focus();
  startOverlay.classList.add("hidden");
  resultOverlay.classList.add("hidden");
  running=true;
  last=performance.now();
  raf=requestAnimationFrame(loop);
}

function loop(now){
  if(!running)return;
  const dt=Math.min(.034,(now-last)/1000);
  last=now;
  update(dt);
  draw();
  raf=requestAnimationFrame(loop);
}

function update(dt){
  totalTime+=dt;
  const coffeeBoost=coffeeTime>0?1.28:1;
  speed+=(18*dpr*dt);
  const moveSpeed=speed*coffeeBoost;

  distance+=moveSpeed*dt*.22/dpr;
  score+=Math.floor(dt*12*coffeeBoost);

  if(distance>=goalDistance){
    win();
    return;
  }

  if(coffeeTime>0)coffeeTime-=dt;
  if(vacationTime>0)vacationTime-=dt;
  coffeeBadge.classList.toggle("show",coffeeTime>0);
  vacationBadge.classList.toggle("show",vacationTime>0);

  player.anim+=dt*10;
  const tx=laneX(laneTarget);
  player.x+=(tx-player.x)*Math.min(1,dt*13);

  spawnTimer-=dt;
  const spawnRate=Math.max(.42,1.05-totalTime*.012);
  if(spawnTimer<=0){
    spawnObject();
    spawnTimer=spawnRate;
  }

  for(const o of objects){
    o.y+=moveSpeed*dt*(o.speed||1);
    if(o.type==="boss")o.x+=Math.sin(totalTime*5+o.phase)*35*dpr*dt;
  }

  objects=objects.filter(o=>!o.dead && o.y<H+90*dpr);

  for(const o of objects){
    if(checkCollision(player,o)){
      handleObject(o);
    }
  }

  updateParticles(dt);
  if(shake>0)shake-=dt;
  updateTexts();
}

function spawnObject(){
  const lane=Math.floor(Math.random()*laneCount);
  const r=Math.random();
  let type;
  if(r<.20)type="money";
  else if(r<.30)type="coffee";
  else if(r<.39)type="vacation";
  else if(r<.61)type="meeting";
  else if(r<.78)type="paper";
  else if(r<.91)type="boss";
  else type="bomb";

  objects.push({
    type,
    lane,
    x:laneX(lane),
    y:-70*dpr,
    w:(type==="meeting"?62:44)*dpr,
    h:(type==="meeting"?52:44)*dpr,
    speed:type==="boss"?1.08:1,
    phase:Math.random()*Math.PI*2,
    dead:false
  });

  // 후반에는 가끔 2개 동시 등장
  if(totalTime>25 && Math.random()<.32){
    const lane2=(lane+pick([1,2]))%3;
    const type2=pick(["meeting","paper","money","boss"]);
    objects.push({
      type:type2,
      lane:lane2,
      x:laneX(lane2),
      y:-145*dpr,
      w:(type2==="meeting"?62:44)*dpr,
      h:(type2==="meeting"?52:44)*dpr,
      speed:type2==="boss"?1.08:1,
      phase:Math.random()*Math.PI*2,
      dead:false
    });
  }
}

function checkCollision(p,o){
  const pad=8*dpr;
  return Math.abs(p.x-o.x)<(p.w+o.w)/2-pad && Math.abs(p.y-o.y)<(p.h+o.h)/2-pad;
}

function handleObject(o){
  if(o.dead)return;
  o.dead=true;

  if(o.type==="money"){
    score+=100;
    itemsCollected++;
    showJudge("+100");
    spawnParticles(o.x,o.y,"good");
    return;
  }
  if(o.type==="coffee"){
    coffeeTime=4.2;
    score+=40;
    itemsCollected++;
    showJudge("커피!");
    spawnParticles(o.x,o.y,"coffee");
    return;
  }
  if(o.type==="vacation"){
    vacationTime=4.8;
    score+=60;
    itemsCollected++;
    showJudge("연차!");
    spawnParticles(o.x,o.y,"vacation");
    return;
  }

  if(vacationTime>0){
    score+=30;
    showJudge("무적!");
    spawnParticles(o.x,o.y,"shield");
    return;
  }

  if(o.type==="meeting"){
    speed=Math.max(210*dpr,speed-75*dpr);
    score=Math.max(0,score-50);
    showJudge("회의...");
    shake=.18;
    return;
  }
  if(o.type==="paper"){
    score=Math.max(0,score-80);
    showJudge("결재반려");
    shake=.18;
    return;
  }
  if(o.type==="boss"){
    lose("상사에게 붙잡혔습니다.");
    return;
  }
  if(o.type==="bomb"){
    lose("야근폭탄이 터졌습니다.");
    return;
  }
}

function moveLane(dir){
  if(!running)return;
  laneTarget=Math.max(0,Math.min(laneCount-1,laneTarget+dir));
}

function win(){
  score+=1000;
  finish(true,"칼퇴 성공!", "퇴근문을 통과했습니다.");
}

function lose(reason){
  finish(false,"퇴근 실패",reason);
}

function finish(success,title,reason){
  if(!running)return;
  running=false;
  cancelAnimationFrame(raf);

  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  best=Math.max(best,score);
  localStorage.setItem("kaltoe-run-best",String(best));

  resultTitle.textContent=title;
  resultReason.textContent=reason;
  resultScore.textContent=score.toLocaleString();
  resultBest.textContent=best.toLocaleString();
  resultDistance.textContent=Math.floor(distance)+"m";
  resultItems.textContent=itemsCollected;

  setTimeout(()=>resultOverlay.classList.remove("hidden"),330);
}

function showJudge(text){
  judge.textContent=text;
  judge.classList.remove("show");
  void judge.offsetWidth;
  judge.classList.add("show");
}

function updateTexts(){
  scoreText.textContent=score.toLocaleString();
  bestText.textContent=best.toLocaleString();
  distanceText.textContent=Math.max(0,Math.floor(goalDistance-distance))+"m";
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){
    ctx.translate((Math.random()-.5)*10*dpr*shake*8,(Math.random()-.5)*10*dpr*shake*8);
  }
  drawOfficeRoad();
  drawObjects();
  drawParticles();
  drawPlayer();
  ctx.restore();
}

function drawOfficeRoad(){
  const roadW=Math.min(W*.82,430*dpr);
  const left=W/2-roadW/2;
  const right=W/2+roadW/2;
  const top=0,bottom=H;

  // floor
  ctx.fillStyle="#121214";
  ctx.fillRect(left,top,roadW,H);

  // side walls
  ctx.fillStyle="#0d0d0f";
  ctx.fillRect(0,0,left,H);
  ctx.fillRect(right,0,W-right,H);

  // carpet / corridor
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#202024");
  g.addColorStop(1,"#151518");
  ctx.fillStyle=g;
  ctx.fillRect(left+12*dpr,0,roadW-24*dpr,H);

  // lanes
  ctx.strokeStyle="rgba(255,255,255,.09)";
  ctx.lineWidth=1*dpr;
  for(let i=1;i<laneCount;i++){
    const x=left+roadW*i/laneCount;
    ctx.setLineDash([14*dpr,18*dpr]);
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // moving floor lines
  ctx.strokeStyle="rgba(255,255,255,.045)";
  ctx.lineWidth=2*dpr;
  const offset=(distance*18*dpr)%80*dpr;
  for(let y=-80*dpr+offset;y<H;y+=80*dpr){
    ctx.beginPath();
    ctx.moveTo(left+22*dpr,y);
    ctx.lineTo(right-22*dpr,y);
    ctx.stroke();
  }

  // exit sign at progress
  ctx.fillStyle="rgba(192,0,1,.18)";
  ctx.fillRect(left+20*dpr,82*dpr,roadW-40*dpr,4*dpr);
}

function drawPlayer(){
  const x=player.x,y=player.y;
  const bob=Math.sin(player.anim)*2*dpr;

  // shadow
  ctx.fillStyle="rgba(0,0,0,.35)";
  ctx.beginPath();
  ctx.ellipse(x,y+31*dpr,20*dpr,7*dpr,0,0,Math.PI*2);
  ctx.fill();

  // legs
  ctx.strokeStyle="#1f2937";
  ctx.lineWidth=5*dpr;
  ctx.lineCap="round";
  const legSwing=Math.sin(player.anim)*5*dpr;
  ctx.beginPath();
  ctx.moveTo(x-6*dpr,y+17*dpr+bob);
  ctx.lineTo(x-11*dpr-legSwing,y+34*dpr);
  ctx.moveTo(x+6*dpr,y+17*dpr+bob);
  ctx.lineTo(x+11*dpr+legSwing,y+34*dpr);
  ctx.stroke();

  // body
  ctx.fillStyle="#f5f5f5";
  roundRect(x-14*dpr,y-18*dpr+bob,28*dpr,36*dpr,8*dpr);
  ctx.fill();

  // tie
  ctx.fillStyle="#c00001";
  ctx.beginPath();
  ctx.moveTo(x,y-8*dpr+bob);
  ctx.lineTo(x-5*dpr,y+10*dpr+bob);
  ctx.lineTo(x,y+19*dpr+bob);
  ctx.lineTo(x+5*dpr,y+10*dpr+bob);
  ctx.closePath();
  ctx.fill();

  // head
  ctx.fillStyle="#ffd1a6";
  ctx.beginPath();
  ctx.arc(x,y-34*dpr+bob,12*dpr,0,Math.PI*2);
  ctx.fill();

  // hair
  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.arc(x,y-40*dpr+bob,12*dpr,Math.PI,Math.PI*2);
  ctx.fill();

  // briefcase
  ctx.fillStyle="#3f2b1f";
  roundRect(x+16*dpr,y-2*dpr+bob,14*dpr,18*dpr,3*dpr);
  ctx.fill();

  if(vacationTime>0){
    ctx.strokeStyle="rgba(255,211,95,.9)";
    ctx.lineWidth=3*dpr;
    ctx.beginPath();
    ctx.arc(x,y-8*dpr,34*dpr,0,Math.PI*2);
    ctx.stroke();
  }
}

function drawObjects(){
  for(const o of objects){
    const x=o.x,y=o.y;
    ctx.save();
    ctx.translate(x,y);
    const s=dpr;

    if(o.type==="money"){
      ctx.fillStyle="#ffd35f";
      roundRect(-18*s,-13*s,36*s,26*s,5*s);
      ctx.fill();
      ctx.fillStyle="#111";
      ctx.font=`${15*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("₩",0,1*s);
    }

    if(o.type==="coffee"){
      ctx.fillStyle="#fff";
      roundRect(-13*s,-16*s,26*s,32*s,6*s);
      ctx.fill();
      ctx.fillStyle="#c00001";
      ctx.fillRect(-13*s,-4*s,26*s,12*s);
      ctx.strokeStyle="#fff";ctx.lineWidth=3*s;
      ctx.beginPath();ctx.arc(15*s,-2*s,8*s,-Math.PI/2,Math.PI/2);ctx.stroke();
      ctx.fillStyle="#111";
      ctx.font=`${11*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("CO",0,2*s);
    }

    if(o.type==="vacation"){
      ctx.fillStyle="#87ceeb";
      roundRect(-20*s,-14*s,40*s,28*s,5*s);
      ctx.fill();
      ctx.fillStyle="#111";
      ctx.font=`${11*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("연차",0,1*s);
    }

    if(o.type==="meeting"){
      ctx.fillStyle="#2b2b31";
      roundRect(-28*s,-22*s,56*s,44*s,7*s);
      ctx.fill();
      ctx.fillStyle="#c00001";
      ctx.font=`${12*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("회의",0,-2*s);
      ctx.fillStyle="#777";
      ctx.fillRect(-20*s,9*s,40*s,4*s);
    }

    if(o.type==="paper"){
      ctx.fillStyle="#f8f8f8";
      roundRect(-16*s,-22*s,32*s,44*s,4*s);
      ctx.fill();
      ctx.strokeStyle="#c00001";
      ctx.lineWidth=2*s;
      ctx.beginPath();ctx.moveTo(-9*s,-8*s);ctx.lineTo(9*s,-8*s);ctx.moveTo(-9*s,1*s);ctx.lineTo(9*s,1*s);ctx.moveTo(-9*s,10*s);ctx.lineTo(5*s,10*s);ctx.stroke();
      ctx.fillStyle="#c00001";
      ctx.font=`${9*s}px system-ui`;
      ctx.textAlign="center";ctx.fillText("결재",0,20*s);
    }

    if(o.type==="boss"){
      ctx.fillStyle="#111";
      ctx.beginPath();ctx.arc(0,-18*s,13*s,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#6b7280";
      roundRect(-18*s,-5*s,36*s,34*s,7*s);
      ctx.fill();
      ctx.fillStyle="#c00001";
      ctx.font=`${11*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("상사",0,8*s);
    }

    if(o.type==="bomb"){
      ctx.fillStyle="#151515";
      ctx.beginPath();ctx.arc(0,0,20*s,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#ffd35f";ctx.lineWidth=3*s;
      ctx.beginPath();ctx.moveTo(10*s,-16*s);ctx.quadraticCurveTo(20*s,-30*s,30*s,-20*s);ctx.stroke();
      ctx.fillStyle="#c00001";
      ctx.font=`${10*s}px system-ui`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText("야근",0,2*s);
    }

    ctx.restore();
  }
}

function spawnParticles(x,y,type="good"){
  const color=type==="coffee"?"#8b5e34":type==="vacation"?"#87ceeb":type==="shield"?"#ffd35f":"#fff";
  for(let i=0;i<14;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*180*dpr,
      vy:(Math.random()-.5)*160*dpr,
      life:.35+Math.random()*.24,
      max:.6,
      color
    });
  }
}

function updateParticles(dt){
  particles=particles.filter(p=>{
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.life-=dt;
    return p.life>0;
  });
}

function drawParticles(){
  ctx.save();
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2.8*dpr,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

leftZone.addEventListener("pointerdown",e=>{e.preventDefault();moveLane(-1)});
rightZone.addEventListener("pointerdown",e=>{e.preventDefault();moveLane(1)});
window.addEventListener("keydown",e=>{
  if(e.code==="ArrowLeft"){e.preventDefault();moveLane(-1)}
  if(e.code==="ArrowRight"){e.preventDefault();moveLane(1)}
},{capture:true});

startBtn.addEventListener("click",startGame);
retryBtn.addEventListener("click",startGame);
homeBtn.addEventListener("click",()=>{
  resultOverlay.classList.add("hidden");
  startOverlay.classList.remove("hidden");
  resetGame();
});
document.addEventListener("visibilitychange",()=>{if(document.hidden&&running)lose("업무 메신저에 붙잡혔습니다.")});

resetGame();
</script>
